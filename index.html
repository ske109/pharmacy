          if (!purch || !purch.length) { alert("No purchase records found"); return; }
          askConfirm("Run cost migration on " + bills.length + " bills and " + inv.length + " inventory items?", function() {
            var invUpdated = 0, billItemsUpdated = 0;

            // Build purchase lookup: name+batch → cost data
            var costLookup = {};
            purch.forEach(function(p) {
              (p.items || []).forEach(function(it) {
                var key = (it.name || "").toLowerCase().trim() + "|" + (it.batch || "").trim();
                var totalUnits = (it.qty || 0) + (it.freeQty || 0);
                var paidQty = it.qty || 0;
                var freeRatio = totalUnits > 0 ? paidQty / totalUnits : 1;
                var uc = (it.ptr || 0) * (1 - (it.discPct || 0) / 100) * (1 - (it.schemePct || 0) / 100) * (1 + (it.gstRate || 0) / 100) * freeRatio;
                costLookup[key] = { unitCost: Math.round(uc * 100) / 100, purchDiscPct: it.discPct || 0, purchSchemePct: it.schemePct || 0, purchFreeRatio: Math.round(freeRatio * 10000) / 10000 };
              });
            });

            // Update inventory
            var newInv = inv.map(function(m) {
              if (m.unitCost && m.unitCost > 0) return m;
              var key = (m.name || "").toLowerCase().trim() + "|" + (m.batch || "").trim();
              var cd = costLookup[key];
              if (cd) { invUpdated++; return Object.assign({}, m, cd); }
              // Fallback: calculate from PTR+GST if no purchase match
              if (m.ptr && m.ptr > 0) {
                invUpdated++;
                return Object.assign({}, m, { unitCost: Math.round(m.ptr * (1 + (m.gstRate || 0) / 100) * 100) / 100, purchDiscPct: 0, purchSchemePct: 0, purchFreeRatio: 1 });
              }
              return m;
            });
            saveInv(newInv);

            // Update bills
            var newBills = bills.map(function(b) {
              var items = b.items.map(function(it) {
                if (it.unitCost && it.unitCost > 0) return it;
                // Try exact match
                var key = (it.name || "").toLowerCase().trim() + "|" + (it.batch || "").trim();
                var cd = costLookup[key];
                if (cd) {
                  billItemsUpdated++;
                  var uc = it.loose ? cd.unitCost / (it.packQty || 10) : cd.unitCost;
                  return Object.assign({}, it, { unitCost: Math.round(uc * 100) / 100, purchDiscPct: cd.purchDiscPct, purchSchemePct: cd.purchSchemePct, purchFreeRatio: cd.purchFreeRatio });
                }
                // Try name-only match
                var nameKey = Object.keys(costLookup).find(function(k) { return k.split("|")[0] === (it.name || "").toLowerCase().trim(); });
                if (nameKey) {
                  cd = costLookup[nameKey];
                  billItemsUpdated++;
                  var uc2 = it.loose ? cd.unitCost / (it.packQty || 10) : cd.unitCost;
                  return Object.assign({}, it, { unitCost: Math.round(uc2 * 100) / 100, purchDiscPct: cd.purchDiscPct, purchSchemePct: cd.purchSchemePct, purchFreeRatio: cd.purchFreeRatio });
                }
                // Fallback: PTR+GST
                if ((it.unitPtr || it.ptr) && (it.unitPtr || it.ptr) > 0) {
                  billItemsUpdated++;
                  var fallbackCost = (it.unitPtr || it.ptr) * (1 + (it.gstRate || 0) / 100);
                  return Object.assign({}, it, { unitCost: Math.round(fallbackCost * 100) / 100, purchDiscPct: 0, purchSchemePct: 0, purchFreeRatio: 1 });
                }
                return it;
              });
              return Object.assign({}, b, { items: items });
            });
            saveBills(newBills);

            alert("Cost migration complete!\n\nInventory: " + invUpdated + " items updated\nBill items: " + billItemsUpdated + " items updated\n\nProfit Margin tab will now show accurate data.");
          });
        }} style={{ ...bts(true), background: "#B45309", padding: "10px 20px" }}>
          Run Cost Migration
        </button>
        <div style={{ fontSize: 11, color: "#888", marginTop: 8 }}>
          Formula: unitCost = PTR x (1 - Disc%) x (1 - Scheme%) x (1 + GST%) x PaidQty / (PaidQty + FreeQty)
        </div>
      </div>
    </div>
  );
}
function ProfitPage({ bills, inv, mob }) {
  const [view, setView] = useState("bill");
  const [fromD, setFromD] = useState("");
  const [toD, setToD] = useState("");
  const now = new Date();

  const filterBills = (blist) => {
    if (view === "today") return blist.filter((b) => new Date(b.date).toDateString() === now.toDateString());
    if (view === "week") { const w = new Date(now); w.setDate(w.getDate() - 7); return blist.filter((b) => new Date(b.date) >= w); }
    if (view === "month") return blist.filter((b) => { const d = new Date(b.date); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
    if (view === "year") return blist.filter((b) => new Date(b.date).getFullYear() === now.getFullYear());
    if (view === "custom" && fromD && toD) return blist.filter((b) => { const d = new Date(b.date); return d >= new Date(fromD) && d <= new Date(toD + "T23:59:59"); });
    return blist;
  };

  const calcItemProfit = (it) => {
    const salePrice = (it.unitPrice || it.mrp) * it.qty;
    const discAmt = salePrice * (it.discount || 0) / 100;
    const netSale = salePrice - discAmt;
    // Cost = PTR × (1-PurchDisc%) × (1-Scheme%) × (1+GST%) adjusted for free items
    var ptr = it.unitPtr || it.ptr || 0;
    var purchDisc = it.purchDiscPct || 0;
    var scheme = it.purchSchemePct || 0;
    var freeRatio = it.purchFreeRatio || 1; // ratio of paid/(paid+free), default 1 if no free
    var costPerUnit = ptr * (1 - purchDisc / 100) * (1 - scheme / 100) * (1 + (it.gstRate || 0) / 100) * freeRatio;
    // If unitCost is pre-calculated (from migration), use it directly
    if (it.unitCost && it.unitCost > 0) costPerUnit = it.unitCost;
    const totalCost = costPerUnit * it.qty;
    return { netSale, totalCost, profit: netSale - totalCost, margin: netSale > 0 ? ((netSale - totalCost) / netSale * 100) : 0 };
  };

  const calcBillProfit = (bill) => {
    let totalSale = 0, totalCost = 0, totalDisc = 0;
    bill.items.forEach((it) => {
      const p = calcItemProfit(it);
      totalSale += p.netSale;
      totalCost += p.totalCost;
      totalDisc += (it.unitPrice || it.mrp) * it.qty * (it.discount || 0) / 100;
    });
    totalDisc += (bill.billDiscount || 0);
    const netSale = totalSale - (bill.billDiscount || 0);
    return { netSale, totalCost, totalDisc, profit: netSale - totalCost, margin: netSale > 0 ? ((netSale - totalCost) / netSale * 100) : 0 };
  };

  const fl = filterBills(bills);
  const totals = fl.reduce((acc, b) => { const p = calcBillProfit(b); return { sale: acc.sale + p.netSale, cost: acc.cost + p.totalCost, disc: acc.disc + p.totalDisc, profit: acc.profit + p.profit }; }, { sale: 0, cost: 0, disc: 0, profit: 0 });
  const overallMargin = totals.sale > 0 ? (totals.profit / totals.sale * 100) : 0;

  return (
    <div><h2 style={hds}>Profit Margin Analysis</h2>
      <div style={{ display: "flex", gap: 3, background: "#E8E4DD", borderRadius: 7, padding: 3, marginBottom: 16, flexWrap: "wrap" }}>
        {[["bill","All Bills"],["today","Today"],["week","Week"],["month","Month"],["year","Year"],["custom","Custom"]].map(([id, l]) => <button key={id} onClick={() => setView(id)} style={{ padding: "6px 12px", border: "none", borderRadius: 5, fontSize: 11.5, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", background: view === id ? "#fff" : "transparent", color: view === id ? "#0D6B5B" : "#888" }}>{l}</button>)}</div>
      {view === "custom" && <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <div><label style={{ fontSize: 10, fontWeight: 600, color: "#888" }}>From</label><input type="date" value={fromD} onChange={(e) => setFromD(e.target.value)} style={inps} /></div>
        <div><label style={{ fontSize: 10, fontWeight: 600, color: "#888" }}>To</label><input type="date" value={toD} onChange={(e) => setToD(e.target.value)} style={inps} /></div></div>}

      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(5,1fr)", gap: 12, marginBottom: 16 }}>
        <Stat icon="🧾" label="Bills" value={fl.length} color="#2563EB" />
        <Stat icon="💰" label="Net Sales" value={"Rs." + f2(totals.sale)} color="#059669" />
        <Stat icon="📦" label="Cost (PTR+Tax)" value={"Rs." + f2(totals.cost)} color="#B45309" />
        <Stat icon="🏷" label="Discounts Given" value={"Rs." + f2(totals.disc)} color="#DC2626" />
        <Stat icon="📈" label="Profit" value={"Rs." + f2(totals.profit)} sub={f2(overallMargin) + "% margin"} color={totals.profit >= 0 ? "#059669" : "#DC2626"} />
      </div>

      <div style={cds}><b>Bill-wise Breakdown ({fl.length})</b>
        {fl.length === 0 ? <p style={{ color: "#aaa", textAlign: "center", padding: 16, fontSize: 12 }}>No bills in this period</p> :
        <div style={{ overflowX: "auto", marginTop: 10 }}><table style={{ width: "100%", borderCollapse: "collapse", minWidth: 650 }}><thead><tr>
          {["Bill","Date","Patient","Net Sale","Discounts","Cost","Profit","Margin %"].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>
          {[...fl].reverse().map((b) => { const p = calcBillProfit(b);
            return (<tr key={b.billNo}>
              <td style={{ ...tds, fontFamily: "monospace", fontWeight: 600, color: "#0D6B5B" }}>{b.billNo}</td>
              <td style={tds}>{fD(b.date)}</td>
              <td style={tds}>{b.patient}</td>
              <td style={{ ...tds, fontWeight: 600 }}>Rs.{f2(p.netSale)}</td>
              <td style={{ ...tds, color: "#DC2626" }}>Rs.{f2(p.totalDisc)}</td>
              <td style={{ ...tds, color: "#B45309" }}>Rs.{f2(p.totalCost)}</td>
              <td style={{ ...tds, fontWeight: 700, color: p.profit >= 0 ? "#059669" : "#DC2626" }}>Rs.{f2(p.profit)}</td>
              <td style={{ ...tds, fontWeight: 600, color: p.margin >= 20 ? "#059669" : p.margin >= 10 ? "#D97706" : "#DC2626" }}>{f2(p.margin)}%</td>
            </tr>); })}</tbody></table></div>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
// RACK MANAGEMENT PAGE
// ══════════════════════════════════════════════
function RackPage({ inv, saveInv, mob }) {
  const [selected, setSelected] = useState([]);
  const [dragMed, setDragMed] = useState(null);
  const [filterRack, setFilterRack] = useState("");
  const [showAll, setShowAll] = useState(false);

  // Generate all rack names
  var ALL_RACKS = [];
  var letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  letters.forEach(function(l) { for (var i = 1; i <= 100; i++) ALL_RACKS.push(l + i); });
  for (var i = 1; i <= 100; i++) ALL_RACKS.push("BH-" + i);

  // Get racks that have medicines
  var usedRacks = {};
  inv.forEach(function(m) { if (m.rack) usedRacks[m.rack] = true; });
  var usedList = Object.keys(usedRacks).sort();

  // Filter racks for display
  var displayRacks = showAll ? ALL_RACKS.filter(function(r) { return !filterRack || r.toLowerCase().indexOf(filterRack.toLowerCase()) >= 0; }).slice(0, 50) : usedList;

  var assignToRack = function(rackName, medIds) {
    var next = inv.map(function(m) { return medIds.indexOf(m.id) >= 0 ? Object.assign({}, m, { rack: rackName }) : m; });
    saveInv(next);
    setSelected([]);
  };

  var removeFromRack = function(medId) {
    var next = inv.map(function(m) { return m.id === medId ? Object.assign({}, m, { rack: "" }) : m; });
    saveInv(next);
  };

  var toggleSelect = function(id) {
    setSelected(function(p) { return p.indexOf(id) >= 0 ? p.filter(function(x) { return x !== id; }) : p.concat([id]); });
  };

  var unassigned = inv.filter(function(m) { return !m.rack; });
  var getRackMeds = function(r) { return inv.filter(function(m) { return m.rack === r; }); };
  const [medSearch, setMedSearch] = useState("");
  var filteredMeds = inv.filter(function(m) {
    if (m.rack) return false;
    if (!medSearch) return true;
    var s = medSearch.toLowerCase();
    return m.name.toLowerCase().indexOf(s) >= 0 || (m.batch || "").toLowerCase().indexOf(s) >= 0 || (m.manufacturer || "").toLowerCase().indexOf(s) >= 0;
  });

  var selectAll = function() {
    if (selected.length === filteredMeds.length) { setSelected([]); }
    else { setSelected(filteredMeds.map(function(m) { return m.id; })); }
  };

  return (
    <div><h2 style={hds}>Rack Management</h2>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <button onClick={function() { setShowAll(!showAll); }} style={bts(!showAll)}>{showAll ? "Show Used Racks Only" : "Show All Racks"}</button>
        {showAll && <input value={filterRack} onChange={function(e) { setFilterRack(e.target.value); }} placeholder="Filter racks (e.g. A1, BH-5)" style={{ ...inps, maxWidth: 200 }} />}
        {showAll && <span style={{ fontSize: 11, color: "#888" }}>Showing max 50. Type to filter.</span>}
      </div>

      {selected.length > 0 && <div style={{ ...cds, background: "#D1FAE5", border: "2px solid #059669", display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <b style={{ color: "#065F46", fontSize: 13 }}>{selected.length} medicine(s) selected. Assign to rack:</b>
        <select onChange={function(e) { if (e.target.value) { assignToRack(e.target.value, selected); e.target.value = ""; } }} style={{ ...inps, width: 120 }}>
          <option value="">Select rack</option>
          {ALL_RACKS.map(function(r) { return <option key={r} value={r}>{r}</option>; })}
        </select>
        <button onClick={function() { setSelected([]); }} style={bts(false)}>Clear</button>
      </div>}

      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 16 }}>
        <div>
          <div style={{ ...cds, border: "2px solid #D4D0C8" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <b style={{ fontSize: 14 }}>Unassigned ({unassigned.length})</b>
              <div style={{ display: "flex", gap: 6 }}>
                {filteredMeds.length > 0 && <button onClick={selectAll} style={{ ...bts(false), padding: "4px 10px", fontSize: 11 }}>{selected.length === filteredMeds.length ? "Deselect All" : "Select All"}</button>}
              </div>
            </div>
            <input value={medSearch} onChange={function(e) { setMedSearch(e.target.value); }} placeholder="Search medicine name, batch, manufacturer..." style={{ ...inps, marginBottom: 10, fontSize: 12 }} />
            <div style={{ maxHeight: 400, overflowY: "auto" }}>
              {filteredMeds.length === 0 && <p style={{ color: "#aaa", fontSize: 12, textAlign: "center", padding: 16 }}>{medSearch ? "No matches" : "All assigned"}</p>}
              {filteredMeds.map(function(m) {
                var isSel = selected.indexOf(m.id) >= 0;
                return (
                  <div key={m.id} draggable onDragStart={function() { setDragMed(m.id); }} onClick={function() { toggleSelect(m.id); }}
                    style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", marginBottom: 4, borderRadius: 8, cursor: "pointer", border: isSel ? "2px solid #0D6B5B" : "1px solid #eee", background: isSel ? "#D1FAE5" : "#FAFAF7", fontSize: 12.5 }}>
                    <div style={{ width: 18, height: 18, borderRadius: 4, border: isSel ? "2px solid #0D6B5B" : "2px solid #ccc", background: isSel ? "#0D6B5B" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "#fff", fontSize: 12, fontWeight: 700 }}>{isSel ? "✓" : ""}</div>
                    <div style={{ flex: 1 }}><b>{m.name}</b><span style={{ color: "#888", marginLeft: 6 }}>{m.batch}</span></div>
                    <span style={{ color: "#888", fontSize: 11, whiteSpace: "nowrap" }}>Stock: {fStock(m.stock, m.packQty)}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        <div>
          {displayRacks.length === 0 && <div style={{ ...cds, textAlign: "center", color: "#aaa", fontSize: 13, padding: 30 }}>{showAll ? "No racks match filter" : "No racks in use yet. Select medicines and assign, or click 'Show All Racks'"}</div>}
          {displayRacks.map(function(r) {
            var meds = getRackMeds(r);
            return (
              <div key={r}
                onDragOver={function(e) { e.preventDefault(); }}
                onDrop={function(e) { e.preventDefault(); if (dragMed) { assignToRack(r, [dragMed]); setDragMed(null); } }}
                style={{ ...cds, border: meds.length > 0 ? "2px solid #0D6B5B" : "2px dashed #bbb", minHeight: 50 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: meds.length > 0 ? 8 : 0 }}>
                  <b style={{ fontSize: 15, color: "#0D6B5B" }}>{r}</b>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    {meds.length > 0 && <Tag bg="#D1FAE5" fg="#065F46">{meds.length} items | {meds.reduce(function(s,m){return s + (m.stock||0);},0)} units</Tag>}
                    {selected.length > 0 && <button onClick={function() { assignToRack(r, selected); }} style={{ ...bts(true), padding: "4px 10px", fontSize: 11 }}>Assign {selected.length}</button>}
                  </div>
                </div>
                {meds.length > 0 && <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                  {meds.map(function(m) {
                    return (
                      <div key={m.id} style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "3px 8px", background: "#EFF6FF", borderRadius: 6, fontSize: 11 }}>
                        <span>{m.name}</span>
                        <span style={{ color: "#0D6B5B", fontWeight: 600, fontSize: 10 }}>({fStock(m.stock, m.packQty)})</span>
                        <button onClick={function() { removeFromRack(m.id); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#DC2626", fontSize: 12, padding: 0 }}>x</button>
                      </div>
                    );
                  })}
                </div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
// AUDIT PAGE
// ══════════════════════════════════════════════
function AuditPage({ inv, mob }) {
  const [checked, setChecked] = useState({});
  const [auditStarted, setAuditStarted] = useState(false);
  const [auditReport, setAuditReport] = useState(null);
  const [pastAudits, setPastAudits] = useState([]);
  const [viewReport, setViewReport] = useState(null);
  const [clock, setClock] = useState(new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata", day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true }));

  useEffect(function() {
    var t = setInterval(function() { setClock(new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata", day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true })); }, 1000);
    fbListen("audits", function(data) { setPastAudits(data ? Object.values(data) : []); });
    return function() { clearInterval(t); };
  }, []);

  // Group medicines by rack
  var rackGroups = {};
  var noRack = [];
  inv.forEach(function(m) {
    if (m.rack) {
      if (!rackGroups[m.rack]) rackGroups[m.rack] = [];
      rackGroups[m.rack].push(m);
    } else {
      noRack.push(m);
    }
  });
  var sortedRacks = Object.keys(rackGroups).sort();

  var startAudit = function() {
    setAuditStarted(true);
    setChecked({});
    setAuditReport(null);
  };

  var toggleCheck = function(id) {
    setChecked(function(p) { var n = Object.assign({}, p); n[id] = !n[id]; return n; });
  };

  var checkAll = function() {
    var all = {};
    inv.forEach(function(m) { all[m.id] = true; });
    setChecked(all);
  };

  var uncheckAll = function() { setChecked({}); };

  var completeAudit = function() {
    var valid = [];
    var invalid = [];
    inv.forEach(function(m) {
      var item = { id: m.id, name: m.name, batch: m.batch, rack: m.rack || "Unassigned", stock: m.stock, packQty: m.packQty, mrp: m.mrp, expiry: m.expiry || "" };
      if (checked[m.id]) valid.push(item);
      else invalid.push(item);
    });

    var report = {
      id: mkId(),
      date: new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata", day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true }),
      totalItems: inv.length,
      validCount: valid.length,
      invalidCount: invalid.length,
      validItems: valid,
      invalidItems: invalid,
      auditedBy: "Staff"
    };

    // Save to Firebase
    db.ref("audits/" + report.id).set(report);
    setAuditReport(report);
    setAuditStarted(false);
  };

  var renderMedRow = function(m) {
    return (
      <div key={m.id} onClick={function() { if (auditStarted) toggleCheck(m.id); }}
        style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", marginBottom: 3, borderRadius: 8, border: checked[m.id] ? "2px solid #059669" : "1px solid #eee", background: checked[m.id] ? "#D1FAE5" : "#FAFAF7", cursor: auditStarted ? "pointer" : "default", fontSize: 12.5 }}>
        {auditStarted && <div style={{ width: 20, height: 20, borderRadius: 4, border: checked[m.id] ? "2px solid #059669" : "2px solid #ccc", background: checked[m.id] ? "#059669" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "#fff", fontSize: 13, fontWeight: 700 }}>{checked[m.id] ? "\u2713" : ""}</div>}
        <div style={{ flex: 1 }}><b>{m.name}</b><span style={{ color: "#888", marginLeft: 6, fontSize: 11 }}>{m.batch}</span></div>
        <span style={{ color: "#0D6B5B", fontWeight: 600, fontSize: 11, whiteSpace: "nowrap" }}>{fStock(m.stock, m.packQty)}</span>
        <span style={{ color: "#888", fontSize: 10, whiteSpace: "nowrap" }}>{m.expiry || ""}</span>
      </div>
    );
  };

  var totalChecked = Object.keys(checked).filter(function(k) { return checked[k]; }).length;

  return (
    <div><h2 style={hds}>Inventory Audit</h2>

      {/* Live clock */}
      <div style={{ ...cds, display: "flex", justifyContent: "space-between", alignItems: "center", background: "#F0FDF4", borderLeft: "4px solid #0D6B5B" }}>
        <div><span style={{ fontSize: 18, marginRight: 8 }}>🕐</span><b style={{ fontSize: 16, color: "#0C2E24" }}>{clock}</b><span style={{ fontSize: 11, color: "#888", marginLeft: 8 }}>IST</span></div>
        <div style={{ fontSize: 12, color: "#555" }}>Total: <b>{inv.length}</b> items | In Racks: <b>{inv.length - noRack.length}</b> | Unassigned: <b>{noRack.length}</b></div>
      </div>

      {/* Action buttons */}
      {!auditStarted && !auditReport && <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <button onClick={startAudit} style={{ ...bts(true), padding: "12px 28px", fontSize: 14 }}>Start New Audit</button>
      </div>}

      {auditStarted && <div style={{ ...cds, background: "#FFFBEB", border: "2px solid #F59E0B", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <div><b style={{ color: "#B45309" }}>Audit in Progress</b><span style={{ fontSize: 12, color: "#888", marginLeft: 8 }}>{totalChecked}/{inv.length} verified</span></div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={checkAll} style={{ ...bts(false), padding: "5px 12px", fontSize: 11 }}>Check All</button>
          <button onClick={uncheckAll} style={{ ...bts(false), padding: "5px 12px", fontSize: 11 }}>Uncheck All</button>
          <button onClick={completeAudit} style={{ border: "none", borderRadius: 7, padding: "8px 20px", fontWeight: 600, cursor: "pointer", fontSize: 13, background: "#059669", color: "#fff" }}>Complete Audit</button>
          <button onClick={function() { setAuditStarted(false); setChecked({}); }} style={bts(false)}>Cancel</button>
        </div>
      </div>}

      {/* Progress bar during audit */}
      {auditStarted && <div style={{ background: "#E5E7EB", borderRadius: 8, height: 8, marginBottom: 16, overflow: "hidden" }}>
        <div style={{ background: "#059669", height: "100%", width: (totalChecked / Math.max(inv.length, 1) * 100) + "%", borderRadius: 8, transition: "width 0.3s" }}></div>
      </div>}

      {/* Audit Report */}
      {(auditReport || viewReport) && (function() {
        var rpt = viewReport || auditReport;
        return <div style={{ ...cds, border: "2px solid #0D6B5B", marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div><b style={{ fontSize: 16, color: "#0D6B5B" }}>Audit Report</b><div style={{ fontSize: 12, color: "#888" }}>{rpt.date}</div></div>
            <button onClick={function() { setAuditReport(null); setViewReport(null); }} style={bts(false)}>Close</button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4,1fr)", gap: 10, marginBottom: 16 }}>
            <Stat icon="📦" label="Total Items" value={rpt.totalItems} color="#0D6B5B" />
            <Stat icon="✅" label="Verified" value={rpt.validCount} color="#059669" />
            <Stat icon="❌" label="Not Verified" value={rpt.invalidCount} color="#DC2626" />
            <Stat icon="📊" label="Accuracy" value={Math.round(rpt.validCount / Math.max(rpt.totalItems, 1) * 100) + "%"} color={rpt.validCount === rpt.totalItems ? "#059669" : "#B45309"} />
          </div>

          {rpt.invalidCount > 0 && <div style={{ marginBottom: 12 }}>
            <b style={{ color: "#DC2626", fontSize: 13 }}>Not Verified ({rpt.invalidCount})</b>
            <div style={{ overflowX: "auto", marginTop: 6 }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
              {["Medicine","Batch","Rack","Stock","MRP","Expiry"].map(function(h) { return <th key={h} style={ths}>{h}</th>; })}</tr></thead><tbody>
              {rpt.invalidItems.map(function(m) { return <tr key={m.id} style={{ background: "#FEF2F2" }}>
                <td style={{ ...tds, fontWeight: 600, color: "#DC2626" }}>{m.name}</td>
                <td style={{ ...tds, fontFamily: "monospace", fontSize: 11 }}>{m.batch || "-"}</td>
                <td style={tds}>{m.rack}</td>
                <td style={{ ...tds, fontWeight: 600 }}>{fStock(m.stock, m.packQty)}</td>
                <td style={tds}>Rs.{f2(m.mrp)}</td>
                <td style={tds}>{m.expiry || "-"}</td></tr>; })}
            </tbody></table></div>
          </div>}

          {rpt.validCount > 0 && <div>
            <b style={{ color: "#059669", fontSize: 13 }}>Verified ({rpt.validCount})</b>
            <div style={{ overflowX: "auto", marginTop: 6 }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
              {["Medicine","Batch","Rack","Stock","MRP","Expiry"].map(function(h) { return <th key={h} style={ths}>{h}</th>; })}</tr></thead><tbody>
              {rpt.validItems.map(function(m) { return <tr key={m.id}>
                <td style={{ ...tds, fontWeight: 500 }}>{m.name}</td>
                <td style={{ ...tds, fontFamily: "monospace", fontSize: 11 }}>{m.batch || "-"}</td>
                <td style={tds}>{m.rack}</td>
                <td style={{ ...tds, fontWeight: 600, color: "#059669" }}>{fStock(m.stock, m.packQty)}</td>
                <td style={tds}>Rs.{f2(m.mrp)}</td>
                <td style={tds}>{m.expiry || "-"}</td></tr>; })}
            </tbody></table></div>
          </div>}
        </div>;
      })()}

      {/* Rack-wise inventory list (audit mode or view mode) */}
      {!auditReport && !viewReport && <div>
        {sortedRacks.map(function(rack) {
          var meds = rackGroups[rack];
          return <div key={rack} style={{ ...cds, borderLeft: "4px solid #0D6B5B" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <b style={{ fontSize: 15, color: "#0D6B5B" }}>{rack}</b>
              <Tag bg="#D1FAE5" fg="#065F46">{meds.length} items</Tag>
            </div>
            {meds.map(renderMedRow)}
          </div>;
        })}

        {noRack.length > 0 && <div style={{ ...cds, borderLeft: "4px solid #B45309" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <b style={{ fontSize: 15, color: "#B45309" }}>Unassigned (No Rack)</b>
            <Tag bg="#FEF3C7" fg="#92400E">{noRack.length} items</Tag>
          </div>
          {noRack.map(renderMedRow)}
        </div>}
      </div>}

      {/* Past Audit Reports */}
      {pastAudits.length > 0 && !auditStarted && !auditReport && !viewReport && <div style={{ ...cds, marginTop: 16 }}>
        <b style={{ fontSize: 14 }}>Past Audit Reports ({pastAudits.length})</b>
        <div style={{ overflowX: "auto", marginTop: 10 }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
          {["Date","Total","Verified","Not Verified","Accuracy",""].map(function(h) { return <th key={h} style={ths}>{h}</th>; })}</tr></thead><tbody>
          {[].concat(pastAudits).reverse().map(function(a) {
            return <tr key={a.id}>
              <td style={tds}>{a.date}</td>
              <td style={tds}>{a.totalItems}</td>
              <td style={{ ...tds, color: "#059669", fontWeight: 600 }}>{a.validCount}</td>
              <td style={{ ...tds, color: a.invalidCount > 0 ? "#DC2626" : "#059669", fontWeight: 600 }}>{a.invalidCount}</td>
              <td style={tds}><Tag bg={a.validCount === a.totalItems ? "#D1FAE5" : "#FEF3C7"} fg={a.validCount === a.totalItems ? "#065F46" : "#92400E"}>{Math.round(a.validCount / Math.max(a.totalItems, 1) * 100)}%</Tag></td>
              <td style={tds}><button onClick={function() { setViewReport(a); }} style={{ ...bts(true), padding: "4px 10px", fontSize: 11 }}>View</button></td>
            </tr>;
          })}</tbody></table></div>
      </div>}
    </div>
  );
}

// RETURNS PAGE
// ══════════════════════════════════════════════
function ReturnsPage({ purch, inv, saveInv, savePurch, mob, askConfirm }) {
  const [retPurch, setRetPurch] = useState(null);
  const [retQtys, setRetQtys] = useState({});
  const [returns, setReturns] = useState([]);
  const [billReturns, setBillReturns] = useState([]);

  useEffect(() => {
    fbListen("returns", (data) => { setReturns(data ? Object.values(data) : []); });
    fbListen("billReturns", (data) => { setBillReturns(data ? Object.values(data) : []); });
  }, []);

  const saveReturns = (data) => {
    const obj = {}; data.forEach((r) => { obj[r.id] = r; });
    fbSet("returns", obj);
  };

  const startReturn = (p) => {
    setRetPurch(p);
    const qtys = {};
    p.items.forEach((it, i) => { qtys[i] = 0; });
    setRetQtys(qtys);
  };

  const processReturn = () => {
    if (!retPurch) return;
    const returnItems = [];
    retPurch.items.forEach((it, i) => {
      const rq = retQtys[i] || 0;
      if (rq > 0) returnItems.push({ ...it, returnQty: rq });
    });
    if (returnItems.length === 0) { alert("Set return quantities"); return; }

    askConfirm("Return " + returnItems.length + " item(s) from " + retPurch.supplier + "?", () => {
      const ret = { id: mkId(), purchaseId: retPurch.id, supplier: retPurch.supplier, invoiceNo: retPurch.invoiceNo, date: new Date().toISOString(), items: returnItems, totalAmount: returnItems.reduce((s, i) => s + (i.ptr || i.mrp || 0) * i.returnQty, 0) };
      const newReturns = [...returns, ret];
      saveReturns(newReturns);

      // Update inventory - reduce stock
      const next = inv.map((m) => {
        const retItem = returnItems.find((ri) => m.name.toLowerCase() === ri.name.toLowerCase() && m.batch === ri.batch);
        if (retItem) return { ...m, stock: Math.max(0, m.stock - retItem.returnQty) };
        return m;
      });
      saveInv(next);

      setRetPurch(null);
      setRetQtys({});
    });
  };

  return (
    <div><h2 style={hds}>Purchase Returns</h2>

      {retPurch ? (
        <div style={{ ...cds, border: "2px solid #DC2626" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div><b style={{ color: "#DC2626" }}>Return from: {retPurch.supplier}</b><div style={{ fontSize: 12, color: "#888" }}>Invoice: {retPurch.invoiceNo || "-"} | Date: {fD(retPurch.date)}</div></div>
            <div style={{ display: "flex", gap: 6 }}><button onClick={processReturn} style={{ border: "none", borderRadius: 7, padding: "9px 18px", fontWeight: 600, cursor: "pointer", fontSize: 13, background: "#DC2626", color: "#fff" }}>Process Return</button><button onClick={() => setRetPurch(null)} style={bts(false)}>Cancel</button></div>
          </div>
          <div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
            {["Medicine","Batch","Purchased Qty","Return Qty","PTR","Return Amt"].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>
            {retPurch.items.map((it, i) => (
              <tr key={i}>
                <td style={{ ...tds, fontWeight: 500 }}>{it.name}</td>
                <td style={{ ...tds, fontFamily: "monospace", fontSize: 11 }}>{it.batch || "-"}</td>
                <td style={tds}>{it.qty}</td>
                <td style={{ padding: "4px" }}><input type="number" min="0" max={it.qty} value={retQtys[i] || 0} onChange={(e) => setRetQtys((p) => ({ ...p, [i]: Math.min(it.qty, Math.max(0, parseInt(e.target.value) || 0)) }))} style={{ ...smis, width: 65, textAlign: "center" }} /></td>
                <td style={tds}>Rs.{f2(it.ptr || it.mrp)}</td>
                <td style={{ ...tds, fontWeight: 700, color: "#DC2626" }}>Rs.{f2((it.ptr || it.mrp || 0) * (retQtys[i] || 0))}</td>
              </tr>
            ))}</tbody></table></div>
          <div style={{ textAlign: "right", marginTop: 8, fontSize: 14, fontWeight: 700, color: "#DC2626" }}>
            Total Return: Rs.{f2(retPurch.items.reduce((s, it, i) => s + (it.ptr || it.mrp || 0) * (retQtys[i] || 0), 0))}
          </div>
        </div>
      ) : (
        <div style={cds}><b>Select Purchase to Return</b>
          {purch.length === 0 ? <p style={{ color: "#aaa", fontSize: 12, textAlign: "center", padding: 16 }}>No purchases</p> :
          <div style={{ overflowX: "auto", marginTop: 10 }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
            {["Invoice","Supplier","Date","Items","Amount",""].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>
            {[...purch].reverse().map((p) => (<tr key={p.id}>
              <td style={{ ...tds, fontWeight: 600 }}>{p.invoiceNo || "-"}</td><td style={tds}>{p.supplier}</td><td style={tds}>{fD(p.date)}</td>
              <td style={tds}>{p.items.length}</td><td style={{ ...tds, fontWeight: 600 }}>Rs.{f2(p.netAmount)}</td>
              <td style={tds}><button onClick={() => startReturn(p)} style={{ border: "none", borderRadius: 7, padding: "5px 12px", fontWeight: 600, cursor: "pointer", fontSize: 11, background: "#DC2626", color: "#fff" }}>Return</button></td>
            </tr>))}</tbody></table></div>}
        </div>
      )}

      {returns.length > 0 && <div style={cds}><b>Purchase Return History ({returns.length})</b>
        <div style={{ overflowX: "auto", marginTop: 10 }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
          {["Date","Supplier","Invoice","Items","Amount"].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>
          {[...returns].reverse().map((r) => (<tr key={r.id}>
            <td style={tds}>{fD(r.date)}</td><td style={tds}>{r.supplier}</td><td style={tds}>{r.invoiceNo || "-"}</td>
            <td style={tds}>{r.items.length}</td><td style={{ ...tds, fontWeight: 700, color: "#DC2626" }}>Rs.{f2(r.totalAmount)}</td>
          </tr>))}</tbody></table></div></div>}

      {billReturns.length > 0 && <div style={{ ...cds, borderLeft: "4px solid #DC2626" }}><b>Customer / Bill Return History ({billReturns.length})</b>
        <div style={{ overflowX: "auto", marginTop: 10 }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
          {["Date","Bill No","Patient","Items","Refund"].map(function(h) { return <th key={h} style={ths}>{h}</th>; })}</tr></thead><tbody>
          {[...billReturns].reverse().map(function(r) { return (<tr key={r.id}>
            <td style={tds}>{fD(r.date)}</td><td style={{ ...tds, fontFamily: "monospace", fontWeight: 600 }}>{r.billNo}</td><td style={tds}>{r.patient}</td>
            <td style={tds}>{r.items.length} ({r.items.map(function(i) { return i.name.split(" ")[0] + "x" + i.returnQty; }).join(", ")})</td>
            <td style={{ ...tds, fontWeight: 700, color: "#DC2626" }}>Rs.{f2(r.refundAmount)}</td>
          </tr>); })}</tbody></table></div></div>}
    </div>
  );
}

// ENCYCLOPEDIA (MedGuide India Live)
// ══════════════════════════════════════════════
function EncyclopediaPage({ inv, mob }) {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState(null);
  const [alts, setAlts] = useState(null);
  const [loading, setLoading] = useState(false);
  const [altsLoading, setAltsLoading] = useState(false);
  const [error, setError] = useState("");

  var searchBrand = function(q) {
    if (!q.trim()) return;
    setLoading(true); setResults(null); setAlts(null); setError("");
    var url = "https://www.medguideindia.info/show_brand.php?search_type=brand&brandname=" + encodeURIComponent(q.trim()) + "&submit=FIND";
    fetch(PROXY_URL + "/medguide?url=" + encodeURIComponent(url))
    .then(function(r) { if (!r.ok) throw new Error("Status " + r.status); return r.text(); })
    .then(function(html) {
      var parsed = parseMedGuideHTML(html);
      setResults(parsed);
      setLoading(false);
      if (parsed.length > 0 && parsed[0].constituents) searchAlts(parsed[0].constituents);
    })
    .catch(function(err) { setError("Could not reach MedGuide India. Please update Cloudflare Worker with /medguide route."); setLoading(false); });
  };

  var searchAlts = function(constituents) {
    var parts = constituents.split(/[,;+&]/).map(function(p) { return p.trim(); });
    var main = "";
    for (var i = 0; i < parts.length; i++) {
      var c = parts[i].replace(/[-]\s*[\d.]+\s*(%|mg|ml|gm|mcg|iu|g|w\/v|w\/w)/gi, "").trim();
      if (c.length > 2 && c.match(/[a-zA-Z]/)) { main = c; break; }
    }
    if (!main) return;
    setAltsLoading(true);
    var url = "https://www.medguideindia.info/show_brand.php?search_type=generic&genericname=" + encodeURIComponent(main) + "&submit=FIND";
    fetch(PROXY_URL + "/medguide?url=" + encodeURIComponent(url))
    .then(function(r) { return r.text(); })
    .then(function(html) { setAlts({ generic: main, items: parseMedGuideHTML(html) }); setAltsLoading(false); })
    .catch(function() { setAltsLoading(false); });
  };

  var doSearch = function() { searchBrand(query); };

  return (
    <div><h2 style={hds}>Medicine Encyclopedia</h2>
      <div style={{ fontSize: 12, color: "#888", marginBottom: 14 }}>Search 50,000+ Indian medicine brands — powered by MedGuide India</div>

      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        <input value={query} onChange={function(e){setQuery(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")doSearch();}} placeholder="Type brand or medicine name..." style={{ ...inps, flex: 1, fontSize: 16, padding: "14px 18px" }} />
        <button onClick={doSearch} disabled={loading} style={{ ...bts(true), padding: "14px 28px", fontSize: 14, opacity: loading ? 0.6 : 1 }}>{loading ? "Searching..." : "Search"}</button>
      </div>

      {error && <div style={{ padding: "12px 16px", background: "#FEF3C7", border: "1px solid #D97706", borderRadius: 10, fontSize: 13, color: "#92400E", marginBottom: 16 }}>{error}</div>}

      {loading && <div style={{ ...cds, textAlign: "center", padding: 40 }}><div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div><div style={{ color: "#888", fontSize: 14 }}>Searching MedGuide India...</div></div>}

      {/* Results as cards */}
      {results && results.length > 0 && results.map(function(r, i) {
        var isInv = inv.some(function(im) { return im.name.toLowerCase().indexOf(r.name.split("(")[0].trim().toLowerCase()) >= 0; });
        var invItems = inv.filter(function(im) { return im.name.toLowerCase().indexOf(r.name.split("(")[0].trim().toLowerCase()) >= 0; });
        return <div key={i} style={{ ...cds, borderLeft: "4px solid #0D6B5B", marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontSize: 20, fontWeight: 800, color: "#0C2E24" }}>{r.name}</div>
              <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>{r.manufacturer}</div>
            </div>
            <div style={{ display: "flex", gap: 5 }}>
              {r.type && <Tag bg="#F3E8FF" fg="#6B21A8">{r.type}</Tag>}
              {isInv && <Tag bg="#D1FAE5" fg="#065F46">IN STOCK</Tag>}
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr 1fr", gap: 12, marginTop: 14 }}>
            <div style={{ padding: "10px 14px", background: "#F5F3EE", borderRadius: 10 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#888", marginBottom: 4 }}>CONSTITUENTS</div>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#0D6B5B" }}>{r.constituents || "-"}</div>
            </div>
            <div style={{ padding: "10px 14px", background: "#F5F3EE", borderRadius: 10 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#888", marginBottom: 4 }}>UNIT / PACKAGE</div>
              <div style={{ fontSize: 13 }}>{r.unit || "-"} / {r.packageUnit || "-"}</div>
            </div>
            <div style={{ padding: "10px 14px", background: "#F0FDF4", borderRadius: 10, border: "1px solid #D1FAE5" }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#888", marginBottom: 4 }}>PRICE</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: "#0D6B5B" }}>Rs. {r.price || "-"}</div>
              {r.pricePerUnit && <div style={{ fontSize: 11, color: "#888" }}>{r.pricePerUnit}/unit</div>}
            </div>
          </div>
          {isInv && invItems.length > 0 && <div style={{ marginTop: 10, padding: "8px 12px", background: "#F0FDF4", borderRadius: 8, border: "1px solid #059669" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#059669", marginBottom: 4 }}>Your Inventory</div>
            {invItems.map(function(im) { return <div key={im.id} style={{ fontSize: 12 }}>{im.name} | Batch: {im.batch || "-"} | Stock: {fStock(im.stock, im.packQty)} | MRP: Rs.{f2(im.mrp)}</div>; })}
          </div>}
          {r.constituents && i === 0 && !alts && !altsLoading && <button onClick={function() { searchAlts(r.constituents); }} style={{ marginTop: 10, border: "none", borderRadius: 8, padding: "8px 18px", fontWeight: 600, cursor: "pointer", fontSize: 12, background: "#7C3AED", color: "#fff" }}>Find Alternatives</button>}
        </div>;
      })}

      {results && results.length === 0 && !loading && <div style={{ ...cds, textAlign: "center", padding: 30, color: "#888" }}>No brands found for "<b>{query}</b>"</div>}

      {/* Alternatives */}
      {altsLoading && <div style={{ ...cds, textAlign: "center", padding: 24, borderLeft: "4px solid #7C3AED" }}><div style={{ color: "#888", fontSize: 13 }}>Finding alternative brands...</div></div>}
      {alts && alts.items && alts.items.length > 0 && <div style={{ ...cds, borderLeft: "4px solid #7C3AED" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div><b style={{ fontSize: 15, color: "#7C3AED" }}>Alternatives for "{alts.generic}"</b><div style={{ fontSize: 11, color: "#888" }}>{alts.items.length} brand(s) found with same salt</div></div>
        </div>
        <div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
          {["#","Brand","Type","Constituents","Price","Manufacturer","Stock"].map(function(h) { return <th key={h} style={ths}>{h}</th>; })}</tr></thead><tbody>
          {alts.items.map(function(r, i) {
            var isInv = inv.some(function(im) { return im.name.toLowerCase().indexOf(r.name.split("(")[0].trim().toLowerCase()) >= 0; });
            return <tr key={i} style={{ background: isInv ? "#F0FDF4" : i % 2 === 0 ? "transparent" : "#FAFAF7" }}>
              <td style={{ ...tds, color: "#888" }}>{i + 1}</td>
              <td style={{ ...tds, fontWeight: 600 }}>{r.name}</td>
              <td style={tds}>{r.type || "-"}</td>
              <td style={{ ...tds, fontSize: 11 }}>{r.constituents || "-"}</td>
              <td style={{ ...tds, fontWeight: 600, color: "#0D6B5B" }}>Rs.{r.price || "-"}</td>
              <td style={{ ...tds, fontSize: 11, color: "#888" }}>{r.manufacturer || "-"}</td>
              <td style={tds}>{isInv ? <Tag bg="#D1FAE5" fg="#065F46">Yes</Tag> : ""}</td>
            </tr>;
          })}</tbody></table></div>
      </div>}

      {/* Empty state */}
      {!results && !loading && <div style={{ textAlign: "center", padding: 50, color: "#888" }}>
        <div style={{ fontSize: 56, marginBottom: 16, opacity: 0.3 }}>📚</div>
        <div style={{ fontSize: 18, fontWeight: 700, color: "#555", marginBottom: 8 }}>Medicine Encyclopedia</div>
        <div style={{ fontSize: 13, marginBottom: 20, color: "#888" }}>Search across 50,000+ Indian medicine brands with live data from MedGuide India</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center", maxWidth: 550, margin: "0 auto" }}>
          {["Dolo 650","Crocin","Azithromycin","Pan 40","Augmentin","Metformin","Combiflam","Cetirizine","Betadine","Montair LC","Diclofenac","Omeprazole","Losartan","Amoxicillin","Atorvastatin","Clopidogrel","Shelcal","Becosules"].map(function(s) {
            return <button key={s} onClick={function() { setQuery(s); searchBrand(s); }} style={{ padding: "7px 16px", background: "#F5F3EE", border: "1px solid #E8E4DD", borderRadius: 20, fontSize: 12, cursor: "pointer", color: "#555" }}>{s}</button>;
          })}
        </div>
      </div>}
    </div>
  );
}

// REPORTS PAGE

function ReportsPage({ bills, inv, mob, showBill }) {
  const [period, setPeriod] = useState("today");
  const [from, setFrom] = useState("");
  const [to, setTo] = useState("");
  const [expanded, setExpanded] = useState(null);

  var now = new Date();
  var filtered = bills.filter(function(b) {
    var d = new Date(b.date);
    if (period === "today") return d.toDateString() === now.toDateString();
    if (period === "week") { var w = new Date(now); w.setDate(w.getDate() - 7); return d >= w; }
    if (period === "month") return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    if (period === "custom" && from && to) return d >= new Date(from) && d <= new Date(to + "T23:59:59");
    return true;
  });

  var sorted = [].concat(filtered).sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

  // Summary
  var totalRevenue = filtered.reduce(function(s, b) { return s + b.netAmount; }, 0);
  var totalItems = filtered.reduce(function(s, b) { return s + b.items.length; }, 0);
  var totalQty = filtered.reduce(function(s, b) { return s + b.items.reduce(function(ss, i) { return ss + i.qty; }, 0); }, 0);
  var totalDisc = filtered.reduce(function(s, b) { return s + (b.totalDiscount || 0) + (b.billDiscount || 0); }, 0);

  // Top sold medicines
  var medSales = {};
  filtered.forEach(function(b) {
    b.items.forEach(function(it) {
      var key = it.name;
      if (!medSales[key]) medSales[key] = { name: it.name, mid: it.mid, qty: 0, revenue: 0, bills: 0 };
      medSales[key].qty += it.qty;
      medSales[key].revenue += (it.unitPrice || it.mrp) * it.qty * (1 - (it.discount || 0) / 100);
      medSales[key].bills += 1;
    });
  });
  var topMeds = Object.values(medSales).sort(function(a, b) { return b.revenue - a.revenue; });

  // Get inventory left for a medicine
  var getStock = function(name, mid) {
    var m = inv.find(function(x) { return x.id === mid; });
    if (m) return fStock(m.stock, m.packQty);
    m = inv.find(function(x) { return x.name === name; });
    if (m) return fStock(m.stock, m.packQty);
    return "0";
  };

  // Print report
  var printReport = function() {
    var pLabel = period === "today" ? "Today" : period === "week" ? "This Week" : period === "month" ? "This Month" : from + " to " + to;
    var html = "<html><head><title>Sales Report - " + pLabel + "</title><style>body{font-family:sans-serif;font-size:11px;padding:20px;max-width:900px;margin:0 auto}table{width:100%;border-collapse:collapse;margin:10px 0}th,td{border:1px solid #999;padding:4px 6px;text-align:left;font-size:10px}th{background:#eee}h2{margin:6px 0}h3{margin:12px 0 4px}.summary{display:flex;gap:20px;margin:10px 0}.scard{padding:8px 14px;border:1px solid #ddd;border-radius:6px}.right{text-align:right}</style></head><body>";
    html += "<h2>A to Z Pharmacy — Sales Report</h2>";
    html += "<p>Period: <b>" + pLabel + "</b> | Generated: " + new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" }) + "</p>";
    html += "<div class='summary'><div class='scard'><b>" + filtered.length + "</b> Bills</div><div class='scard'>Revenue: <b>Rs." + f2(totalRevenue) + "</b></div><div class='scard'>" + totalQty + " units sold</div><div class='scard'>Discounts: Rs." + f2(totalDisc) + "</div></div>";

    // Top medicines table
    html += "<h3>Top Medicines Sold</h3><table><tr><th>#</th><th>Medicine</th><th>Qty Sold</th><th>Revenue</th><th>Bills</th><th>Inventory Left</th></tr>";
    topMeds.slice(0, 30).forEach(function(m, i) {
      html += "<tr><td>" + (i + 1) + "</td><td>" + m.name + "</td><td>" + m.qty + "</td><td class='right'>Rs." + f2(m.revenue) + "</td><td>" + m.bills + "</td><td>" + getStock(m.name, m.mid) + "</td></tr>";
    });
    html += "</table>";

    // Bill details
    html += "<h3>Bill Details</h3>";
    sorted.forEach(function(b) {
      html += "<table><tr><th colspan='6'>" + b.billNo + " | " + (b.dateIST || fDT(b.date)) + " | " + b.patient + " | " + b.paymentMode + " | Net: Rs." + f2(b.netAmount) + "</th></tr>";
      html += "<tr><th>Medicine</th><th>Type</th><th>Qty</th><th>Price</th><th>Disc%</th><th>Amount</th></tr>";
      b.items.forEach(function(it) {
        var amt = (it.unitPrice || it.mrp) * it.qty * (1 - (it.discount || 0) / 100);
        html += "<tr><td>" + it.name + "</td><td>" + (it.loose ? "Loose" : "Pack") + "</td><td>" + it.qty + "</td><td class='right'>Rs." + f2(it.unitPrice || it.mrp) + "</td><td>" + (it.discount || 0) + "%</td><td class='right'>Rs." + f2(amt) + "</td></tr>";
      });
      html += "</table>";
    });

    html += "</body></html>";
    var w = window.open("", "_blank");
    if (w) { w.document.write(html); w.document.close(); w.print(); }
  };

  return (
    <div><h2 style={hds}>Sales Reports</h2>

      {/* Period selector */}
      <div style={{ display: "flex", gap: 3, background: "#E8E4DD", borderRadius: 7, padding: 3, marginBottom: 12, flexWrap: "wrap" }}>
        {[["today","Today"],["week","This Week"],["month","This Month"],["custom","Custom Range"]].map(function(x) { return <button key={x[0]} onClick={function(){setPeriod(x[0]);}} style={{ padding: "7px 14px", border: "none", borderRadius: 5, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", background: period === x[0] ? "#fff" : "transparent", color: period === x[0] ? "#0D6B5B" : "#888" }}>{x[1]}</button>; })}
      </div>
      {period === "custom" && <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
        <div><label style={{ fontSize: 10, fontWeight: 600, color: "#888" }}>From</label><input type="date" value={from} onChange={function(e){setFrom(e.target.value);}} style={inps} /></div>
        <div><label style={{ fontSize: 10, fontWeight: 600, color: "#888" }}>To</label><input type="date" value={to} onChange={function(e){setTo(e.target.value);}} style={inps} /></div>
      </div>}

      {/* Summary cards */}
      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4,1fr)", gap: 12, marginBottom: 20 }}>
        <Stat icon="🧾" label="Bills" value={filtered.length} color="#2563EB" />
        <Stat icon="💰" label="Revenue" value={"Rs." + f2(totalRevenue)} color="#059669" />
        <Stat icon="📦" label="Units Sold" value={totalQty} color="#B45309" />
        <Stat icon="🏷" label="Discounts" value={"Rs." + f2(totalDisc)} color="#DC2626" />
      </div>

      {/* Print button */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <button onClick={printReport} style={{ ...bts(true), padding: "10px 20px", fontSize: 13 }}>🖨 Print Report</button>
      </div>

      {/* Top medicines sold */}
      {topMeds.length > 0 && <div style={{ ...cds, marginBottom: 16 }}>
        <b style={{ fontSize: 14 }}>Top Medicines Sold ({topMeds.length})</b>
        {mob ? <div style={{ marginTop: 10 }}>
          {topMeds.slice(0, 20).map(function(m, i) {
            var stockLeft = getStock(m.name, m.mid);
            return <div key={i} style={{ padding: 10, marginBottom: 6, borderRadius: 10, border: "1px solid #eee", background: "#FAFAF7", borderLeft: "3px solid #0D6B5B" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div><span style={{ fontWeight: 700, fontSize: 13 }}>{i + 1}. {m.name}</span></div>
                <div style={{ fontWeight: 800, color: "#0D6B5B" }}>Rs.{f2(m.revenue)}</div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#888", marginTop: 4 }}>
                <span>Qty: {m.qty} | Bills: {m.bills}</span>
                <span style={{ fontWeight: 600, color: stockLeft === "0" ? "#DC2626" : "#059669" }}>Stock: {stockLeft}</span>
              </div>
            </div>;
          })}
        </div> :
        <div style={{ overflowX: "auto", marginTop: 10 }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
          {["#","Medicine","Qty Sold","Revenue","Bills","Inventory Left"].map(function(h) { return <th key={h} style={ths}>{h}</th>; })}</tr></thead><tbody>
          {topMeds.slice(0, 30).map(function(m, i) {
            var stockLeft = getStock(m.name, m.mid);
            return <tr key={i}>
              <td style={{ ...tds, color: "#888" }}>{i + 1}</td>
              <td style={{ ...tds, fontWeight: 600 }}>{m.name}</td>
              <td style={tds}>{m.qty}</td>
              <td style={{ ...tds, fontWeight: 600, color: "#0D6B5B" }}>Rs.{f2(m.revenue)}</td>
              <td style={tds}>{m.bills}</td>
              <td style={tds}><span style={{ fontWeight: 600, color: stockLeft === "0" ? "#DC2626" : "#059669" }}>{stockLeft}</span></td>
            </tr>;
          })}</tbody></table></div>}
      </div>}

      {/* Bill details */}
      {sorted.length > 0 && <div style={cds}>
        <b style={{ fontSize: 14 }}>Bill Details ({sorted.length})</b>
        <div style={{ marginTop: 10 }}>
          {sorted.map(function(b) {
            var isExp = expanded === b.billNo;
            return <div key={b.billNo} style={{ marginBottom: 8, borderRadius: 10, border: "1px solid #eee", overflow: "hidden" }}>
              {/* Bill header — clickable to expand */}
              <div onClick={function() { setExpanded(isExp ? null : b.billNo); }} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: isExp ? "#F0FDF4" : "#FAFAF7", cursor: "pointer", borderLeft: "3px solid #0D6B5B" }}>
                <div>
                  <span style={{ fontFamily: "monospace", fontWeight: 700, color: "#0D6B5B", fontSize: 13 }}>{b.billNo}</span>
                  <span style={{ color: "#888", fontSize: 11, marginLeft: 8 }}>{b.dateIST || fDT(b.date)}</span>
                  <span style={{ marginLeft: 8, fontSize: 12 }}>{b.patient}</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <Tag bg={b.paymentMode === "Cash" ? "#D1FAE5" : "#DBEAFE"} fg={b.paymentMode === "Cash" ? "#065F46" : "#1E40AF"}>{b.paymentMode}</Tag>
                  <b style={{ fontSize: 14, color: "#0C2E24" }}>Rs.{f2(b.netAmount)}</b>
                  <span style={{ fontSize: 12, color: "#888" }}>{isExp ? "▲" : "▼"}</span>
                </div>
              </div>
              {/* Expanded items */}
              {isExp && <div style={{ padding: mob ? 10 : 14, background: "#fff" }}>
                {mob ? <div>
                  {b.items.map(function(it, i) {
                    var amt = (it.unitPrice || it.mrp) * it.qty * (1 - (it.discount || 0) / 100);
                    var stockLeft = getStock(it.name, it.mid);
                    return <div key={i} style={{ padding: "8px 0", borderBottom: i < b.items.length - 1 ? "1px solid #eee" : "none", fontSize: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div><b>{it.name}</b>{it.loose && <span style={{ color: "#B45309", fontSize: 10, marginLeft: 4 }}>[L]</span>}</div>
                        <b>Rs.{f2(amt)}</b>
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#888", marginTop: 2 }}>
                        <span>Qty: {it.qty}{it.loose ? " pcs" : ""} @ Rs.{f2(it.unitPrice || it.mrp)}{it.discount ? " (-" + it.discount + "%)" : ""}</span>
                        <span style={{ fontWeight: 600, color: stockLeft === "0" ? "#DC2626" : "#059669" }}>Stock: {stockLeft}</span>
                      </div>
                    </div>;
                  })}
                </div> :
                <table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
                  {["Medicine","Type","Qty","Price","Disc%","Amount","Inventory Left"].map(function(h) { return <th key={h} style={{ ...ths, fontSize: 11, background: "#DCFCE7" }}>{h}</th>; })}</tr></thead><tbody>
                  {b.items.map(function(it, i) {
                    var amt = (it.unitPrice || it.mrp) * it.qty * (1 - (it.discount || 0) / 100);
                    var stockLeft = getStock(it.name, it.mid);
                    return <tr key={i}>
                      <td style={{ ...tds, fontWeight: 500 }}>{it.name}</td>
                      <td style={tds}>{it.loose ? <Tag bg="#FEF3C7" fg="#92400E">Loose</Tag> : <Tag bg="#DBEAFE" fg="#1E40AF">Pack</Tag>}</td>
                      <td style={tds}>{it.qty}{it.loose ? " pcs" : ""}</td>
                      <td style={tds}>Rs.{f2(it.unitPrice || it.mrp)}</td>
                      <td style={tds}>{it.discount || 0}%</td>
                      <td style={{ ...tds, fontWeight: 600 }}>Rs.{f2(amt)}</td>
                      <td style={tds}><span style={{ fontWeight: 600, color: stockLeft === "0" ? "#DC2626" : "#059669" }}>{stockLeft}</span></td>
                    </tr>;
                  })}</tbody></table>}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8, paddingTop: 8, borderTop: "1px solid #eee" }}>
                  <button onClick={function() { showBill(b, true); }} style={{ ...bts(true), padding: "6px 14px", fontSize: 11 }}>View Full Bill</button>
                  <div style={{ fontSize: 12 }}>
                    {b.totalDiscount > 0 && <span style={{ color: "#DC2626", marginRight: 8 }}>Item Disc: -Rs.{f2(b.totalDiscount)}</span>}
                    {b.billDiscount > 0 && <span style={{ color: "#DC2626", marginRight: 8 }}>Bill Disc: -Rs.{f2(b.billDiscount)}</span>}
                    <b style={{ fontSize: 14, color: "#0D6B5B" }}>Net: Rs.{f2(b.netAmount)}</b>
                  </div>
                </div>
              </div>}
            </div>;
          })}
        </div>
      </div>}

      {sorted.length === 0 && <div style={{ ...cds, textAlign: "center", padding: 40, color: "#888" }}>
        <div style={{ fontSize: 40, marginBottom: 12, opacity: 0.3 }}>📑</div>
        <div style={{ fontSize: 14 }}>No sales found for the selected period</div>
      </div>}
    </div>
  );
}

// ══════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dash");
  const [inv, setInv] = useState([]);
  const [bills, setBills] = useState([]);
  const [purch, setPurch] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [sideOpen, setSideOpen] = useState(false);
  const [confirmMsg, setConfirmMsg] = useState(null);
  const confirmCb = useRef(null);
  const [viewBill, setViewBill] = useState(null);
  const [billFromHist, setBillFromHist] = useState(false);
  const mob = useM();
  const isO = user ? user.role === "owner" : false;

  // Check auth state on load
  useEffect(() => {
    const unsub = auth.onAuthStateChanged((fbUser) => {
      if (fbUser) {
        const role = ROLES[fbUser.email] || "staff";
        const name = ROLE_NAMES[fbUser.email] || fbUser.email;
        setUser({ id: fbUser.uid, email: fbUser.email, name, role });
      } else {
        setUser(null);
      }
      setLoading(false);
    });
    return unsub;
  }, []);

  // Real-time listeners - sync data across all devices
  useEffect(() => {
    if (!user) return;
    const unsubs = [
      fbListen("inventory", (data) => { setInv(data ? Object.values(data) : []); }),
      fbListen("bills", (data) => { setBills(data ? Object.values(data) : []); }),
      fbListen("purchases", (data) => { setPurch(data ? Object.values(data) : []); }),
      fbListen("sessions", (data) => { setSessions(data ? Object.values(data) : []); }),
    ];
    // Register this session
    const dev = /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop";
    fbSet("sessions/" + user.id, { user: user.name, device: dev, lastActive: new Date().toLocaleString(), uId: user.id });
    return () => unsubs.forEach((u) => u());
  }, [user]);

  // Data save helpers - write to Firebase, listeners auto-update state
  const saveInv = useCallback((data) => {
    const obj = {}; data.forEach((m) => { obj[m.id] = m; });
    fbSet("inventory", obj);
  }, []);
  const saveBills = useCallback((data) => {
    const obj = {}; data.forEach((b) => { obj[b.billNo] = b; });
    fbSet("bills", obj);
  }, []);
  const savePurch = useCallback((data) => {
    const obj = {}; data.forEach((p) => { obj[p.id] = p; });
    fbSet("purchases", obj);
  }, []);
  const saveAll = useCallback((i, b, p) => {
    const io = {}; i.forEach((m) => { io[m.id] = m; });
    const bo = {}; b.forEach((x) => { bo[x.billNo] = x; });
    const po = {}; p.forEach((x) => { po[x.id] = x; });
    fbSet("inventory", io); fbSet("bills", bo); fbSet("purchases", po); fbSet("returns", null); fbSet("racks", null); fbSet("billReturns", null); fbSet("audits", null);
  }, []);

  const askConfirm = useCallback((msg, cb) => { setConfirmMsg(msg); confirmCb.current = cb; }, []);
  const onConfirmYes = () => { if (confirmCb.current) confirmCb.current(); setConfirmMsg(null); confirmCb.current = null; };
  const onConfirmNo = () => { setConfirmMsg(null); confirmCb.current = null; };
  const showBill = useCallback((b, hist) => { setViewBill(b); setBillFromHist(!!hist); }, []);

  const login = (u) => { setUser(u); };
  const logout = () => { auth.signOut(); fbSet("sessions/" + (user ? user.id : ""), null); setUser(null); setPage("dash"); };

  const addBill = useCallback((bill) => {
    setBills((p) => { const next = [...p, bill]; saveBills(next); return next; });
  }, [saveBills]);

  const addPurchase = useCallback((rev) => {
    const pur = { id: mkId(), invoiceNo: rev.invoiceNo || "", supplier: rev.supplier || "", date: rev.date || "", entryDate: new Date().toISOString(), items: rev.items, sourceType: rev.srcType || "manual", sourceFile: rev.srcFile || "", netAmount: rev.items.reduce((s, i) => s + (i.amount || purchCalcAmt(i)), 0) };
    setPurch((p) => { const next = [...p, pur]; savePurch(next); return next; });
    setInv((prevInv) => {
      let next = [...prevInv];
      rev.items.forEach((it) => {
        const ex = next.findIndex((m) => m.name.toLowerCase() === it.name.toLowerCase() && m.batch === it.batch);
        if (ex >= 0) { next = next.map((m, i) => i === ex ? { ...m, stock: m.stock + (it.qty || 0) + (it.freeQty || 0), ptr: it.ptr || m.ptr, mrp: it.mrp || m.mrp } : m); }
        else {
          // Auto-assign rack if same medicine name exists with a rack
          const rackMatch = next.find((m) => m.name.toLowerCase() === it.name.toLowerCase() && m.rack);
          const autoRack = rackMatch ? rackMatch.rack : (it.rack || "");
          var totalUnits = (it.qty || 0) + (it.freeQty || 0);
          var paidQty = it.qty || 0;
          var itemUnitCost = (it.ptr || 0) * (1 - (it.discPct || 0) / 100) * (1 - (it.schemePct || 0) / 100) * (1 + (it.gstRate || 0) / 100) * (totalUnits > 0 ? paidQty / totalUnits : 1);
          next.push({ id: mkId(), name: it.name, manufacturer: it.manufacturer || "", hsn: it.hsn || "300490", batch: it.batch || "", expiry: it.expiry || "", pack: it.pack || "", mrp: it.mrp || 0, ptr: it.ptr || 0, stock: totalUnits, gstRate: it.gstRate || 5, rack: autoRack, packQty: it.packQty || 0, distributor: rev.supplier, purchaseBillNo: pur.invoiceNo || "", purchaseDistributor: rev.supplier || "", purchaseDate: pur.date || "", purchaseId: pur.id || "", purchDiscPct: it.discPct || 0, purchSchemePct: it.schemePct || 0, purchFreeRatio: totalUnits > 0 ? paidQty / totalUnits : 1, unitCost: Math.round(itemUnitCost * 100) / 100, addedFrom: rev.srcType || "manual", uid: mkUID() }); }
      });
      saveInv(next);
      return next;
    });
  }, [saveInv, savePurch]);

  const deletePurchase = useCallback((id) => {
    // Find the purchase to get its items before deleting
    var delPurch = purch.find(function(p) { return p.id === id; });
    setPurch((p) => { const next = p.filter((x) => x.id !== id); savePurch(next); return next; });
    // Reverse inventory: subtract stock added by this purchase
    if (delPurch && delPurch.items) {
      setInv(function(prevInv) {
        var next = prevInv.map(function(m) { return Object.assign({}, m); });
        delPurch.items.forEach(function(it) {
          var ex = -1;
          for (var i = 0; i < next.length; i++) {
            if (next[i].name.toLowerCase() === it.name.toLowerCase() && next[i].batch === (it.batch || "")) { ex = i; break; }
          }
          if (ex >= 0) {
            var addedQty = (it.qty || 0) + (it.freeQty || 0);
            var newStock = next[ex].stock - addedQty;
            if (newStock <= 0) {
              // Remove item entirely if stock goes to 0 or below
              next.splice(ex, 1);
            } else {
              next[ex] = Object.assign({}, next[ex], { stock: newStock });
            }
          }
        });
        saveInv(next);
        return next;
      });
    }
  }, [purch, saveInv, savePurch]);

  if (loading) return (<div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: "#EFECE5", fontFamily: "'Playfair Display',serif", fontSize: 18, color: "#0C2E24" }}>Loading...</div>);
  if (!user) return (<Login onLogin={login} />);

  const counts = { purch: purch.length, returns: 0, hist: bills.length, inv: inv.length, stock: inv.filter((m) => m.stock > 0 && m.stock < 3).length, rack: inv.filter((m) => !m.rack).length };

  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: "'DM Sans',sans-serif", background: "#EFECE5", overflow: "hidden" }}>
      <ConfirmModal msg={confirmMsg} onYes={onConfirmYes} onNo={onConfirmNo} />
      <BillView bill={viewBill} onClose={() => setViewBill(null)} fromHistory={billFromHist} />
      <Sidebar page={page} setPage={setPage} user={user} onLogout={logout} counts={counts} mob={mob} sideOpen={sideOpen} setSideOpen={setSideOpen} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {mob && <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", background: "#fff", borderBottom: "1px solid #E5E2DB", flexShrink: 0 }}>
          <button onClick={() => setSideOpen(true)} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer" }}>☰</button>
          <div style={{ fontWeight: 700, fontFamily: "'Playfair Display',serif", fontSize: 15, color: "#0C2E24" }}>A to Z Pharmacy</div>
          <div style={{ width: 30, height: 30, borderRadius: 7, background: "#E8E4DD", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>{isO ? "👑" : "👤"}</div></div>}
        <div style={{ flex: 1, padding: mob ? 14 : 24, overflow: "auto" }}>
          {page === "dash" && <DashPage inv={inv} bills={bills} purch={purch} isO={isO} mob={mob} />}
          {page === "purch" && <PurchPage purch={purch} addPurchase={addPurchase} deletePurchase={deletePurchase} mob={mob} askConfirm={askConfirm} inv={inv} saveInv={saveInv} bills={bills} saveBills={saveBills} />}
          {page === "returns" && <ReturnsPage purch={purch} inv={inv} saveInv={saveInv} savePurch={savePurch} mob={mob} askConfirm={askConfirm} />}
          {page === "inv" && <InvPage inv={inv} saveInv={saveInv} isO={isO} mob={mob} askConfirm={askConfirm} bills={bills} showBill={showBill} />}
          {page === "rack" && <RackPage inv={inv} saveInv={saveInv} mob={mob} />}
          {page === "audit" && <AuditPage inv={inv} mob={mob} />}
          {page === "bill" && <BillPage inv={inv} saveInv={saveInv} addBill={addBill} mob={mob} showBill={showBill} />}
          {page === "profit" && isO && <ProfitPage bills={bills} inv={inv} mob={mob} />}
          {page === "stock" && <StockPage inv={inv} saveInv={saveInv} isO={isO} mob={mob} />}
          {page === "hist" && <HistPage bills={bills} showBill={showBill} saveBills={saveBills} askConfirm={askConfirm} inv={inv} saveInv={saveInv} />}
          {page === "reports" && <ReportsPage bills={bills} inv={inv} mob={mob} showBill={showBill} />}
          {page === "ency" && <EncyclopediaPage inv={inv} mob={mob} />}
          {page === "users" && isO && <UsersPage sessions={sessions} mob={mob} />}
          {page === "backup" && isO && <BackupPage inv={inv} bills={bills} purch={purch} saveAll={saveAll} askConfirm={askConfirm} saveInv={saveInv} saveBills={saveBills} />}
        </div></div></div>
  );
}

// SETUP SCREEN (shown when Firebase not configured)
function SetupScreen() {
  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0C2E24,#1A5744,#0C2E24)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: "#fff", borderRadius: 16, padding: 36, width: "100%", maxWidth: 600, boxShadow: "0 20px 60px rgba(0,0,0,.3)" }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ width: 56, height: 56, background: "linear-gradient(135deg,#0D6B5B,#34D399)", borderRadius: 14, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 26, marginBottom: 12 }}>💊</div>
          <div style={{ fontSize: 22, fontWeight: 800, fontFamily: "'Playfair Display',serif", color: "#0C2E24" }}>A to Z Pharmacy</div>
          <div style={{ fontSize: 14, color: "#DC2626", marginTop: 8, fontWeight: 600 }}>Setup Required</div></div>
        <div style={{ fontSize: 13, lineHeight: 1.8, color: "#555" }}>
          <p style={{ marginBottom: 12 }}>This app needs a Firebase database to store your data. Follow these steps:</p>
          <ol style={{ paddingLeft: 20 }}>
            <li>Go to <b>console.firebase.google.com</b> and create a free project</li>
            <li>Enable <b>Realtime Database</b> (Build menu, test mode)</li>
            <li>Enable <b>Authentication</b> with Email/Password</li>
            <li>Add users: <b>owner@atozpharmacy.com</b> and <b>staff@atozpharmacy.com</b></li>
            <li>Get the Firebase config from Project Settings</li>
            <li>Open this <b>index.html</b> in a text editor (Notepad)</li>
            <li>Replace <b>PASTE_YOUR_API_KEY</b> etc. with your Firebase values</li>
            <li>Upload to GitHub Pages for a permanent URL</li>
          </ol>
          <p style={{ marginTop: 12, color: "#888", fontSize: 12 }}>See the SETUP_GUIDE.md file for detailed instructions with every click explained.</p>
        </div>
      </div></div>
  );
}

// RENDER
if (!CONFIGURED) {
  ReactDOM.render(<SetupScreen />, document.getElementById("root"));
} else {
  ReactDOM.render(<App />, document.getElementById("root"));
}
</script>
</body>
</html>
