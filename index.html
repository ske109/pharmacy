// Stock display: 19.667 with packQty=15 shows "19 + 10T"
// Stock is in packs/strips. Fractional part = loose tablets. Display as packs.tablets
function fStock(stock, packQty) {
  if (!stock || stock <= 0) return "0";
  var pq = packQty || 10;
  var packs = Math.floor(stock);
  var loose = Math.round((stock - packs) * pq);
  if (loose >= pq) { packs += 1; loose = 0; }
  if (loose === 0) return String(packs);
  return packs + "." + String(loose).padStart(2, "0");
}

function parseCSV(t) { const res = []; let row = [], f = "", q = false; for (let i = 0; i < t.length; i++) { const c = t[i]; if (c === "\"") { q = !q; continue; } if (c === "," && !q) { row.push(f.trim()); f = ""; continue; } if ((c === "\n" || c === "\r") && !q) { if (f || row.length) { row.push(f.trim()); res.push(row); row = []; f = ""; } continue; } f += c; } if (f || row.length) { row.push(f.trim()); res.push(row); } return res; }
function csvToItems(rows) {
  if (rows.length < 2) return null; const h = rows[0].map((x) => x.toLowerCase().trim()); const ix = (n) => h.findIndex((x) => x.includes(n));

}

// ══════════════════════════════════════════════
// PDF TEXT EXTRACTION (free, using pdf.js)
// ══════════════════════════════════════════════
async function extractPdfText(file) {
  var arrayBuf = await file.arrayBuffer();
  var pdf = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
  var allText = "";
  for (var p = 1; p <= pdf.numPages; p++) {
    var page = await pdf.getPage(p);
    var content = await page.getTextContent();
    var lines = {};
    content.items.forEach(function(item) {
      var y = Math.round(item.transform[5]);
      if (!lines[y]) lines[y] = [];
      lines[y].push({ x: Math.round(item.transform[4]), text: item.str });
    });
    var sortedY = Object.keys(lines).sort(function(a, b) { return b - a; });
    sortedY.forEach(function(y) {
      var row = lines[y].sort(function(a, b) { return a.x - b.x; });
      allText += row.map(function(r) { return r.text; }).join(" | ") + "\n";
    });
    allText += "\n---PAGE---\n";
  }
  return allText;
}

function parsePdfToItems(text) {
  var lines = text.split("\n").filter(function(l) { return l.trim() && l !== "---PAGE---"; });
  var supplier = "", invoiceNo = "", date = "";
  var items = [];

  // Junk lines to skip
  var SKIP = /collectable|taxable\s*amount|gst\s*summary|total\s*amount|grand\s*total|round\s*off|tcs|bill\s*discount|bank\s*name|ifsc|branch|declaration|terms\s*and|authorised|computer\s*generated|scan\s*to|buyer|shipping|billing|seller|gstin|state\s*name|telephone|pincode|city:|e-mail|phone:|pan:|dl\s*-|fl\s*-|beat\s*name|delivery\s*date|payment\s*type|po\s*number|so\s*no|dbsr|scheme\s*name|period\s*target|payout|tax\s*payable|invoice\s*no\s*:|invoice\s*date/i;

  // Header
  for (var h = 0; h < Math.min(30, lines.length); h++) {
    var hl = lines[h];
    if (!invoiceNo) { var im = hl.match(/(?:Invoice|Bill)\s*(?:No|Number|#)\s*[:\s]*\|?\s*([A-Z0-9][\w\-]+)/i); if (im) invoiceNo = im[1]; }
    if (!date) { var dm = hl.match(/(?:Date|Dated)\s*[:\s]*\|?\s*(\d{1,2}[\/\-]\w{3,}[\/\-]\d{2,4}|\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/i); if (dm) date = dm[1]; }
    if (!supplier && hl.match(/TRADERS|PHARMA|DISTRIBUTORS|HEALTHCARE|HIVELOOP|ENTERPRISES|WHOLESALE|AGENCIES|MEDICALS|SURGICALS|DRUGS|STORES|LIFESCIENCES|REMEDIES/i)) {
      supplier = hl.replace(/\|/g, " ").replace(/\s+/g, " ").trim().substring(0, 80);
    }
  }

  // Collect item code names, batch/expiry, GST from all lines
  var codeNames = {};
  var batchExp = [];
  var gstInfo = [];

  lines.forEach(function(l, i) {
    // Item code: "0181201 - DETOL,IN,ANTISEP.LIQ,04x5L"
    var cm = l.match(/(\d{4,})\s*-\s*(.{3,}?)(?:\||$)/);
    if (cm) codeNames[i] = cm[2].trim();

    // Batch + Expiry patterns
    // "( VR011 - 1,ExpDt: 07/29)"
    var b1 = l.match(/\(\s*([A-Z0-9][\w]*)\s*-\s*\d+\s*,\s*ExpDt:\s*(\d{1,2})\/(\d{2,4})\s*\)/);
    if (b1) { batchExp.push({i:i, b:b1[1], m:b1[2], y:b1[3]}); return; }
    // "Batch: ABC123" + "Exp: 07/29"
    var bb = l.match(/(?:Batch|B\.?\s*No\.?)\s*[:\s]*\|?\s*([A-Z0-9][\w\-]+)/i);
    var ee = l.match(/(?:Exp(?:iry|\.?\s*D(?:ate|t))?)\s*[:\s]*\|?\s*(\d{1,2})[\/\-](\d{2,4})/i);
    if (bb || ee) batchExp.push({i:i, b:bb?bb[1]:"", m:ee?ee[1]:"", y:ee?ee[2]:""});
    // "WPE25232 | 10/2027" standalone
    var b3 = l.match(/\b([A-Z]{1,4}\d{3,}[\w]*)\b.*?(\d{1,2})\/(\d{2,4})/);
    if (b3 && !bb && !b1) batchExp.push({i:i, b:b3[1], m:b3[2], y:b3[3]});

    // GST% lines: "2.50% | 2.50% | 0.00%"
    var gm = l.match(/(\d+\.?\d*)%/g);
    if (gm && gm.length >= 2) gstInfo.push({i:i, rates:gm.map(function(x){return parseFloat(x);})});
  });

  // Find item rows: lines with qty unit (EA, NOS, PCS, etc.)
  var qtyRe = /(\d+)\s*(EA|NOS|PCS|STRIPS?|TABS?|CAPS?|BOX|BTL|TUBE|VIAL|AMP|UNITS?|PC|NO)\b/i;

  lines.forEach(function(l, idx) {
    if (SKIP.test(l)) return;
    var parts = l.split("|").map(function(p){return p.trim();});
    if (parts.length < 4) return;

    var qm = l.match(qtyRe);
    if (!qm) return;
    var qty = parseInt(qm[1]); // Pure number only

    // Split line at QtyEA to find MRP (last num before) and PTR (first num after)
    var qtyPos = l.indexOf(qm[0]);
    var beforeQty = l.substring(0, qtyPos);
    var afterQty = l.substring(qtyPos + qm[0].length);

    var numsBefore = [];
    beforeQty.split("|").forEach(function(p) {
      p = p.trim();
      if (p.replace(/\s/g, "").match(/^[0-9]{6,8}$/)) return;
      var n = parseFloat(p);
      if (!isNaN(n) && p.match(/^[\d.]+$/)) numsBefore.push(n);
    });
    var numsAfter = [];
    afterQty.split("|").forEach(function(p) {
      p = p.trim();
      var n = parseFloat(p);
      if (!isNaN(n) && p.match(/^[\d.]+$/)) numsAfter.push(n);
    });
    if (numsBefore.length === 0 || numsAfter.length === 0) return;

    var mrp = numsBefore[numsBefore.length - 1];
    var ptr = numsAfter[0];

    // Extract scheme% from after QtyEA - look for first percentage in the text
    var schemePct = 0;
    var afterParts = afterQty.split("|").map(function(p) { return p.trim(); });
    for (var sp = 0; sp < Math.min(3, afterParts.length); sp++) {
      // Skip the first part (PTR) already extracted
      if (sp === 0) continue;
      var spMatch = afterParts[sp].match(/^(\d+\.?\d*)%/);
      if (spMatch && parseFloat(spMatch[1]) > 0) { schemePct = parseFloat(spMatch[1]); break; }
    }

    // Extract free qty - look for "free" or "+N" patterns in the line
    var freeQty = 0;
    var freeMatch = l.match(/free\s*[:=]?\s*(\d+)/i);
    if (freeMatch) freeQty = parseInt(freeMatch[1]);

    // HSN: 6-8 digit number
    var hsn = "";
    var parts = l.split("|").map(function(p){return p.trim();});
    parts.forEach(function(p) { var h = p.replace(/\s/g,""); if (h.match(/^[0-9]{6,8}$/)) hsn = h; });

    // Name: combine text parts + item code from line above
    var texts = [];
    parts.forEach(function(p) {
      if (qtyRe.test(p)) return;
      if (p.replace(/\s/g, "").match(/^[0-9]{6,8}$/)) return;
      if (p.match(/^[\d.]+$/) || p.match(/^\d+\.?\d*%$/)) return;
      if (p.length > 1) texts.push(p);
    });
    var name = texts.filter(function(t) {
      return t.length > 2 && !t.match(/^(EA|UOM|Sr|Qty|MRP|Rate|HSN|Amt|Disc|CGST|SGST|IGST|Taxable|Total|Sch|Amount|NOS|PCS)$/i);
    }).join(" ");
    for (var k = Math.max(0, idx - 6); k < idx; k++) {
      if (codeNames[k]) {
        name = codeNames[k] + (name.length > 2 ? " " + name : "");
        delete codeNames[k];
        break;
      }
    }
    name = name.replace(/\d{5,}\s*-\s*/, "").replace(/\|/g, " ").replace(/\s+/g, " ").trim();
    if (name.length < 2 || !name.match(/[a-zA-Z]/)) return;

    // Batch + Expiry from nearby lines below
    var batch = "", expiry = "";
    for (var b = 0; b < batchExp.length; b++) {
      if (batchExp[b].i > idx && batchExp[b].i <= idx + 6) {
        batch = batchExp[b].b;
        if (batchExp[b].m && batchExp[b].y) {
          var yr = batchExp[b].y;
          expiry = (yr.length === 2 ? "20" + yr : yr) + "-" + batchExp[b].m.padStart(2, "0");
        }
        batchExp.splice(b, 1);
        break;
      }
    }

    // GST% from nearby lines above
    var gstRate = 0;
    for (var g = 0; g < gstInfo.length; g++) {
      if (gstInfo[g].i >= idx - 5 && gstInfo[g].i <= idx + 1) {
        var cgst = gstInfo[g].rates.find(function(r) { return r > 0 && r < 15; });
        if (cgst) gstRate = Math.round(cgst * 2);
        break;
      }
    }

    items.push({
      name: name.substring(0, 80), manufacturer: "", hsn: hsn, batch: batch, expiry: expiry,
      pack: "", mrp: mrp, qty: qty, ptr: Math.round(ptr * 100) / 100, gstRate: gstRate,
      rack: "", packQty: 0, discPct: 0, schemePct: schemePct, freeQty: freeQty, amount: 0
    });
  });

  // Fallback: if no unit-based rows found, try serial number rows
  if (items.length === 0) {
    lines.forEach(function(l, idx) {
      if (SKIP.test(l)) return;
      var parts = l.split("|").map(function(p){return p.trim();});
      if (parts.length < 4) return;
      if (!parts[0].match(/^\d{1,3}$/)) return;
      var sr = parseInt(parts[0]);
      if (sr < 1 || sr > 200) return;

      var nums = [], texts = [];
      parts.slice(1).forEach(function(p) {
        var n = parseFloat(p);
        if (!isNaN(n) && p.match(/^[\d.]+$/)) nums.push(n);
        else if (p.length > 1 && p.match(/[a-zA-Z]/) && !p.match(/^\d+\.?\d*%$/)) texts.push(p);
      });
      if (nums.length < 3) return;

      var name = texts.join(" ").trim();
      for (var k = Math.max(0, idx - 4); k < idx; k++) {
        if (codeNames[k]) { name = codeNames[k] + " " + name; delete codeNames[k]; break; }
      }
      name = name.replace(/\d{5,}\s*-\s*/, "").replace(/\s+/g, " ").trim();
      if (name.length < 2) return;

      var hsn = "";
      parts.forEach(function(p) { var h = p.replace(/\s/g,""); if (h.match(/^[0-9]{6,8}$/)) hsn = h; });

      var sorted = nums.slice().sort(function(a,b){return b-a;});
      var mrp = sorted[0] || 0;
      var ptr = sorted.length > 1 ? sorted[1] : mrp * 0.76;
      var qtyNums = nums.filter(function(n){return Number.isInteger(n) && n > 0 && n < 500;});
      var qty = qtyNums.length > 0 ? qtyNums[0] : 1;

      var batch = "", expiry = "";
      for (var b = 0; b < batchExp.length; b++) {
        if (batchExp[b].i > idx && batchExp[b].i <= idx + 6) {
          batch = batchExp[b].b; if (batchExp[b].m && batchExp[b].y) { var yr = batchExp[b].y; expiry = (yr.length === 2 ? "20" + yr : yr) + "-" + batchExp[b].m.padStart(2,"0"); }
          batchExp.splice(b, 1); break;
        }
      }
      var gstRate = 0;
      for (var g = 0; g < gstInfo.length; g++) {
        if (gstInfo[g].i >= idx - 5 && gstInfo[g].i <= idx + 1) { var cg = gstInfo[g].rates.find(function(r){return r>0&&r<15;}); if (cg) gstRate = Math.round(cg * 2); break; }
      }

      items.push({
        name: name.substring(0, 80), manufacturer: "", hsn: hsn, batch: batch, expiry: expiry,
        pack: "", mrp: mrp, qty: qty, ptr: Math.round(ptr * 100) / 100, gstRate: gstRate,
        rack: "", packQty: 0, discPct: 0, schemePct: 0, freeQty: 0, amount: 0
      });
    });
  }

  return { supplier: supplier, invoiceNo: invoiceNo, date: date, items: items };
}

// COLUMN VISIBILITY TOGGLE
// ══════════════════════════════════════════════
function ColToggle({ cols, visible, setVisible }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [open]);
  const shown = cols.filter((c) => visible[c.key] !== false).length;
  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block" }}>
      <button onClick={() => setOpen((o) => !o)} style={{ ...bts(false), padding: "7px 13px", fontSize: 12, display: "flex", alignItems: "center", gap: 5, border: open ? "1px solid #0D6B5B" : "1px solid #D4D0C8" }}>
        <span>⊞</span> Columns <span style={{ background: "#0D6B5B", color: "#fff", borderRadius: 10, padding: "0 6px", fontSize: 10, fontWeight: 700 }}>{shown}</span>
      </button>
      {open && (
        <div style={{ position: "absolute", top: "110%", right: 0, background: "#fff", border: "1px solid #E5E2DB", borderRadius: 10, boxShadow: "0 8px 24px rgba(0,0,0,.12)", zIndex: 200, minWidth: 180, padding: "8px 0" }}>
          <div style={{ padding: "4px 14px 8px", fontSize: 10, color: "#888", fontWeight: 700, textTransform: "uppercase", borderBottom: "1px solid #f0ede8", marginBottom: 4 }}>Show / Hide Columns</div>
          {cols.map((c) => {
            const on = visible[c.key] !== false;
            return (
              <label key={c.key} style={{ display: "flex", alignItems: "center", gap: 9, padding: "6px 14px", cursor: "pointer", fontSize: 13, userSelect: "none" }}
                onMouseEnter={(e) => e.currentTarget.style.background = "#F5F3FF"}
                onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
                <span style={{ width: 16, height: 16, borderRadius: 4, border: on ? "none" : "2px solid #ccc", background: on ? "#0D6B5B" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 11, color: "#fff", fontWeight: 700 }}>{on ? "✓" : ""}</span>
                <input type="checkbox" checked={on} onChange={() => setVisible((p) => ({ ...p, [c.key]: !on }))} style={{ display: "none" }} />
                {c.label}
              </label>
            );
          })}
          <div style={{ borderTop: "1px solid #f0ede8", margin: "6px 0 2px", padding: "4px 14px" }}>
            <button onClick={() => setVisible(Object.fromEntries(cols.map((c) => [c.key, true])))} style={{ fontSize: 11, color: "#0D6B5B", background: "none", border: "none", cursor: "pointer", fontWeight: 600 }}>Show all</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Login({ onLogin }) {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);
  const go = async () => {
    setLoading(true); setErr("");
    try {
      const cred = await auth.signInWithEmailAndPassword(email, pass);
      const role = ROLES[cred.user.email] || "staff";
      const name = ROLE_NAMES[cred.user.email] || email;
      onLogin({ id: cred.user.uid, email: cred.user.email, name, role });
    } catch (e) {
      setErr(e.message.includes("user-not-found") ? "User not found" : e.message.includes("wrong-password") ? "Wrong password" : "Login failed: " + e.message);

    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0C2E24,#1A5744,#0C2E24)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>

// ══════════════════════════════════════════════
// PURCHASE AMOUNT CALC
// ══════════════════════════════════════════════
function purchCalcAmt(it) {
  const base = (it.ptr || 0) * (it.qty || 0);
  const afterDisc = base * (1 - (it.discPct || 0) / 100);
  const afterScheme = afterDisc * (1 - (it.schemePct || 0) / 100);
  const withGst = afterScheme * (1 + (it.gstRate || 0) / 100);
  return Math.round(withGst * 100) / 100;
}

// BILLING PAGE
// ══════════════════════════════════════════════
function BillPage({ inv, saveInv, addBill, mob, showBill }) {
  const [pt, setPt] = useState(""); const [pc, setPc] = useState(""); const [pa, setPa] = useState(""); const [doc, setDoc] = useState(""); const [dc, setDc] = useState(""); const [pm, setPm] = useState("Cash");
  const [items, setItems] = useState([]); const [sq, setSq] = useState(""); const [so, setSo] = useState(false); const [billDisc, setBillDisc] = useState(0);
  const [scanning, setScanning] = useState(false);
  const [scanResult, setScanResult] = useState(null);
  const camRef = useRef(null);
  const res = sq.length >= 1 ? inv.filter((m) => { const s = sq.toLowerCase(); return (m.name.toLowerCase().includes(s) || m.batch.toLowerCase().includes(s) || (m.uid || "") === sq.toUpperCase() || (m.uid || "").toLowerCase().includes(s)) && m.stock > 0; }).slice(0, 8) : [];
  const addIt = (med) => { const ex = items.findIndex((i) => i.mid === med.id && !i.loose); if (ex >= 0) setItems((p) => p.map((i, idx) => idx === ex ? { ...i, qty: i.qty + 1 } : i)); else setItems((p) => [...p, { mid: med.id, name: med.name, manufacturer: med.manufacturer || "", pack: med.pack || "", batch: med.batch, expiry: med.expiry, mrp: med.mrp, ptr: med.ptr || 0, gstRate: med.gstRate || 5, qty: 1, discount: 0, loose: false, packQty: med.packQty || 0, unitPrice: med.mrp, unitPtr: med.ptr || 0, uid: med.uid || "", purchaseBillNo: med.purchaseBillNo || "", purchaseDistributor: med.purchaseDistributor || med.distributor || "", purchaseDate: med.purchaseDate || "", unitCost: med.unitCost || 0, purchDiscPct: med.purchDiscPct || 0, purchSchemePct: med.purchSchemePct || 0, purchFreeRatio: med.purchFreeRatio || 1 }]); setSq(""); setSo(false); };

  // Camera scan - reads medicine strip/box image and matches to inventory
  const doScan = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    if (!PROXY_READY) { alert("Image AI not configured. See PROXY_SETUP guide to enable."); return; }
    setScanning(true); setScanResult(null);
    try {
      const b64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = rej; r.readAsDataURL(file); });
      const resp = await fetch(PROXY_URL, { method: "POST", headers: CLAUDE_HEADERS,
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: file.type || "image/jpeg", data: b64 } },
            { type: "text", text: "You are a pharmacy medicine identifier. Look at this medicine strip/box image and extract: Name (full name with strength like Paracetamol 500mg), Manufacturer, Batch number, Expiry (YYYY-MM), Pack (like 10 Tab), MRP (number only). Return ONLY valid JSON no markdown: {\"name\":\"\",\"manufacturer\":\"\",\"batch\":\"\",\"expiry\":\"\",\"pack\":\"\",\"mrp\":0}" }
          ] }] }) });
      const data = await resp.json();
      if (data.error) { setScanResult({ type: "err", msg: "API error: " + (data.error.message || "Unknown") }); setScanning(false); return; }
      let text = (data.content || []).map((c) => c.text || "").join("").trim();
      if (text.indexOf("{") > 0) text = text.slice(text.indexOf("{"), text.lastIndexOf("}") + 1);
      const parsed = JSON.parse(text);
      const medName = (parsed.name || "").toLowerCase();
      const match = inv.find((m) => m.stock > 0 && (
        m.name.toLowerCase() === medName ||
        m.name.toLowerCase().includes(medName) ||
        medName.includes(m.name.toLowerCase()) ||
        (parsed.batch && m.batch === parsed.batch)
      ));
      if (match) {
        addIt(match);
        setScanResult({ type: "ok", msg: "Found: " + match.name + " (Stock: " + fStock(match.stock, match.packQty) + ")" });
      } else {
        setScanResult({ type: "info", msg: "Read: " + (parsed.name || "Unknown") + " | MRP: " + (parsed.mrp || "?") + " | Batch: " + (parsed.batch || "?") + " - Not found in inventory." });
        if (parsed.name) setSq(parsed.name);
      }
    } catch (err) {
      console.error(err);
      setScanResult({ type: "err", msg: "Could not read medicine. Try clearer image." });
    }
    setScanning(false);
    e.target.value = "";
  };

  const toggleLoose = (idx) => { setItems((p) => p.map((it, i) => { if (i !== idx) return it; const loose = !it.loose; const pq = it.packQty || 10; const foundM = inv.find((m) => m.id === it.mid); const origMrp = foundM ? foundM.mrp : it.mrp; const origPtr = foundM ? foundM.ptr : it.ptr; const origCost = foundM ? (foundM.unitCost || 0) : (it.unitCost || 0); return { ...it, loose, unitPrice: loose ? it.mrp / pq : origMrp, unitPtr: loose ? (it.ptr || 0) / pq : origPtr, unitCost: loose ? origCost / pq : origCost, qty: 1 }; })); };
  const ca = (i) => { const price = i.unitPrice * i.qty; return price - price * i.discount / 100; };
  const tMRP = items.reduce((s, i) => s + i.unitPrice * i.qty, 0), tDisc = items.reduce((s, i) => s + i.unitPrice * i.qty * i.discount / 100, 0);
  const tGST = items.reduce((s, i) => { const a = ca(i); return s + (a - a / (1 + i.gstRate / 100)); }, 0);
  const net = Math.max(0, Math.round(tMRP - tDisc - billDisc));

  // Per-item: update discount% -> recalc discountRs; update discountRs -> recalc discount%
  const setItemDiscPct = (i, pct) => {
    const v = Math.min(100, Math.max(0, parseFloat(pct) || 0));
    setItems((p) => p.map((x, idx) => { if (idx !== i) return x; const rs = Math.round(x.unitPrice * x.qty * v / 100 * 100) / 100; return { ...x, discount: v, discountRs: rs }; }));
  };
  const setItemDiscRs = (i, rs) => {
    const v = Math.max(0, parseFloat(rs) || 0);
    setItems((p) => p.map((x, idx) => { if (idx !== i) return x; const base = x.unitPrice * x.qty; const pct = base > 0 ? Math.min(100, Math.round(v / base * 10000) / 100) : 0; return { ...x, discountRs: v, discount: pct }; }));
  };
  // Bill-level discount: % and Rs linked
  const [billDiscPct, setBillDiscPct] = useState(0);
  const handleBillDiscPct = (v) => { const pct = Math.min(100, Math.max(0, parseFloat(v) || 0)); setBillDiscPct(pct); setBillDisc(Math.round((tMRP - tDisc) * pct / 100 * 100) / 100); };
  const handleBillDiscRs = (v) => { const rs = Math.max(0, parseFloat(v) || 0); setBillDisc(rs); const base = tMRP - tDisc; setBillDiscPct(base > 0 ? Math.round(rs / base * 10000) / 100 : 0); };

  const gen = () => { if (!pt || !items.length) { alert("Add patient and items"); return; }
    // Validate stock availability
    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      const med = inv.find((m) => m.id === it.mid);
      if (!med) continue;
      const pq = med.packQty || 10;
      if (it.loose) {
        const availTablets = Math.floor(med.stock) * pq + Math.round((med.stock - Math.floor(med.stock)) * pq);
        if (it.qty > availTablets) {
          alert(it.name + ": Only " + availTablets + " tablets available, but " + it.qty + " requested.");
          return;
        }
      } else {
        const availPacks = Math.floor(med.stock);
        if (it.qty > availPacks) {
          alert(it.name + ": Only " + availPacks + " pack(s) available, but " + it.qty + " requested.");
          return;
        }
      }
    }

function StockPage({ inv, saveInv, isO, mob }) {
  const [v, setV] = useState("all"); const [q, setQ] = useState("");

  const low = inv.filter((m) => m.stock > 0 && m.stock < 3), out = inv.filter((m) => m.stock <= 0);
  const expS = inv.filter((m) => { const d = safeExp(m); return d < 90 && d > 0; });
  const expD = inv.filter((m) => safeExp(m) <= 0 && m.expiry);
  let list = v === "low" ? low : v === "out" ? out : v === "exp" ? expS : v === "expd" ? expD : inv;

    { key: "name", label: "Medicine" }, { key: "batch", label: "Batch" }, { key: "exp", label: "Expiry" },

    </div>

        {[{ id: "all", l: "All", n: inv.length, i: "📦", c: "#0D6B5B" }, { id: "low", l: "Low", n: low.length, i: "⚠️", c: "#D97706" }, { id: "out", l: "Out", n: out.length, i: "🚫", c: "#DC2626" }, { id: "exp", l: "Expiring", n: expS.length, i: "⏰", c: "#B45309" }, { id: "expd", l: "Expired", n: expD.length, i: "❌", c: "#991B1B" }].map((s) =>
          <button key={s.id} onClick={() => setV(s.id)} style={{ background: v === s.id ? "#FAFAF7" : "#fff", borderRadius: 10, padding: 12, border: v === s.id ? "2px solid " + s.c : "1px solid #eee", cursor: "pointer", textAlign: "left", borderLeft: "4px solid " + s.c, boxShadow: "0 1px 3px rgba(0,0,0,.04)" }}>
            <div style={{ fontSize: 18 }}>{s.i}</div><div style={{ fontSize: 18, fontWeight: 800, fontFamily: "'Playfair Display',serif" }}>{s.n}</div><div style={{ fontSize: 10, color: "#888" }}>{s.l}</div></button>)}</div>
      <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search..." style={{ ...inps, marginBottom: 14 }} />

      {/* Mobile card view */}
      {mob ? <div>
        {list.map(function(m) {
          var d = safeExp(m); var isE = d <= 0 && m.expiry; var isES = d > 0 && d < 90;
          var st = m.stock <= 0 ? "Out" : m.stock < 3 ? "Low" : isE ? "Expd" : isES ? "Exp" : "OK";
          var sc = { Out: "#DC2626", Low: "#D97706", Expd: "#991B1B", Exp: "#B45309", OK: "#059669" }[st];

          return <div key={m.id} style={{ ...cds, padding: 12, marginBottom: 6, borderLeft: "3px solid " + sc }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div><div style={{ fontWeight: 700, fontSize: 13 }}>{m.name}</div>
                <div style={{ fontSize: 11, color: "#888" }}>{m.batch} | {m.expiry || "No exp"}</div></div>

              <span style={{ fontWeight: 800, fontSize: 16, color: sc }}>{fStock(m.stock, m.packQty)}</span>
              <span style={{ fontSize: 12 }}>MRP: <input type="number" step="0.01" defaultValue={m.mrp} onBlur={function(e) { var v = parseFloat(e.target.value) || 0; if (v !== m.mrp) saveInv(inv.map(function(x) { return x.id === m.id ? Object.assign({}, x, { mrp: v }) : x; })); }} style={{ width: 60, border: "1px solid #eee", borderRadius: 4, padding: "2px 4px", fontSize: 12, textAlign: "right", background: "#FAFAF7" }} /></span>

        {sh("name") && <th style={ths}>Medicine</th>}
        {sh("batch") && <th style={ths}>Batch</th>}

        {list.map((m) => { const d = safeExp(m); const isE = d <= 0 && m.expiry; const isES = d > 0 && d < 90;
          const st = m.stock <= 0 ? "Out" : m.stock < 3 ? "Low" : isE ? "Expd" : isES ? "Exp" : "OK";
          const sc = { Out: "#DC2626", Low: "#D97706", Expd: "#991B1B", Exp: "#B45309", OK: "#059669" }[st];
          const sb = { Out: "#FEE2E2", Low: "#FEF3C7", Expd: "#FEE2E2", Exp: "#FEF9E7", OK: "#D1FAE5" }[st];
          return (<tr key={m.id}>
            {sh("name") && <td style={{ ...tds, fontWeight: 500, whiteSpace: "nowrap" }}>{m.name}</td>}
            {sh("batch") && <td style={{ ...tds, fontFamily: "monospace", fontSize: 11 }}>{m.batch}</td>}
            {sh("exp") && <td style={{ ...tds, color: isE ? "#DC2626" : isES ? "#B45309" : "inherit" }}>{m.expiry || "-"}</td>}
            {sh("mrp") && <td style={{ ...tds, fontWeight: 600 }}><input type="number" step="0.01" defaultValue={m.mrp} onBlur={function(e) { var v = parseFloat(e.target.value) || 0; if (v !== m.mrp) saveInv(inv.map(function(x) { return x.id === m.id ? Object.assign({}, x, { mrp: v }) : x; })); }} style={{ width: 65, border: "1px solid #eee", borderRadius: 4, padding: "2px 4px", fontSize: 12, textAlign: "right", background: "#FAFAF7" }} /></td>}
            {isO && sh("ptr") && <td style={{ ...tds, color: "#B45309" }}>Rs.{f2(m.ptr)}</td>}

            {sh("status") && <td style={tds}><Tag bg={sb} fg={sc}>{st}</Tag></td>}
          </tr>); })}</tbody></table></div>
      {list.length === 0 && <div style={{ padding: 20, textAlign: "center", color: "#aaa", fontSize: 12 }}>No items</div>}</div>}</div>
  );
}

// BILL HISTORY
// ══════════════════════════════════════════════
function HistPage({ bills, showBill, saveBills, askConfirm, inv, saveInv }) {
  const [editBill, setEditBill] = useState(null);
  const [retBill, setRetBill] = useState(null);
  const [retQtys, setRetQtys] = useState({});
  const [editAddQ, setEditAddQ] = useState("");
  const [hFilter, setHFilter] = useState("all");
  const [hFrom, setHFrom] = useState("");
  const [hTo, setHTo] = useState("");
  const mob = useM();

  var now = new Date();
  var filteredBills = bills.filter(function(b) {
    if (hFilter === "all") return true;
    var d = new Date(b.date);
    if (hFilter === "today") return d.toDateString() === now.toDateString();
    if (hFilter === "week") { var w = new Date(now); w.setDate(w.getDate() - 7); return d >= w; }
    if (hFilter === "month") return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    if (hFilter === "custom" && hFrom && hTo) return d >= new Date(hFrom) && d <= new Date(hTo + "T23:59:59");
    return true;
  });

  const editAddItem = function(med) {
    if (!editBill) return;
    var items = editBill.items.slice();
    items.push({ mid: med.id, name: med.name, batch: med.batch, expiry: med.expiry, mrp: med.mrp, unitPrice: med.mrp, ptr: med.ptr || 0, unitPtr: med.ptr || 0, gstRate: med.gstRate || 5, qty: 1, discount: 0, loose: false, packQty: med.packQty || 0, uid: med.uid || "", purchaseBillNo: med.purchaseBillNo || "", purchaseDistributor: med.purchaseDistributor || med.distributor || "", purchaseDate: med.purchaseDate || "" });
    setEditBill(Object.assign({}, editBill, { items: items }));
    setEditAddQ("");
  };

  const editDelItem = function(idx) {
    if (!editBill || editBill.items.length <= 1) { alert("Bill must have at least 1 item"); return; }
    var items = editBill.items.filter(function(_, i) { return i !== idx; });
    setEditBill(Object.assign({}, editBill, { items: items }));
  };

  var editSearchResults = editAddQ.length >= 2 && inv ? inv.filter(function(m) { return m.name.toLowerCase().indexOf(editAddQ.toLowerCase()) >= 0 || (m.uid || "").toLowerCase().indexOf(editAddQ.toLowerCase()) >= 0; }).slice(0, 8) : [];

  const editRef = useRef(null);
  const doEdit = function(b) {
    setEditBill({ ...b, patient: b.patient || "", doctor: b.doctor || "", paymentMode: b.paymentMode || "Cash", billDiscount: b.billDiscount || 0, items: b.items.map(function(i) { return { ...i, unitPrice: i.unitPrice || i.mrp || 0, discount: i.discount || 0, gstRate: i.gstRate || 0 }; }) });
    setTimeout(function() { if (editRef.current) editRef.current.scrollIntoView({ behavior: "smooth", block: "start" }); }, 100);
  };

  const saveEditedBill = () => {
    if (!editBill) return;
    const tMRP = editBill.items.reduce((s, i) => s + (i.unitPrice || i.mrp) * i.qty, 0);
    const tDisc = editBill.items.reduce((s, i) => s + (i.unitPrice || i.mrp) * i.qty * (i.discount || 0) / 100, 0);
    const tGST = editBill.items.reduce((s, i) => { const a = (i.unitPrice || i.mrp) * i.qty * (1 - (i.discount || 0) / 100); return s + (a - a / (1 + (i.gstRate || 0) / 100)); }, 0);
    const net = Math.max(0, Math.round(tMRP - tDisc - (editBill.billDiscount || 0)));
    const updated = { ...editBill, totalMRP: tMRP, totalDiscount: tDisc, netAmount: net, cgst: tGST / 2, sgst: tGST / 2, items: editBill.items.map((i) => ({ ...i, amount: (i.unitPrice || i.mrp) * i.qty * (1 - (i.discount || 0) / 100) })) };
    const next = bills.map((b) => b.billNo === updated.billNo ? updated : b);
    saveBills(next);
    if (inv && saveInv) {
      var changed = false;
      var updInv = inv.map(function(m) {
        var match = editBill.items.find(function(i) { return i.mid === m.id && !i.loose && (i.unitPrice || i.mrp) !== m.mrp; });
        if (match) { changed = true; return Object.assign({}, m, { mrp: match.unitPrice || match.mrp }); }
        return m;
      });
      if (changed) saveInv(updInv);
    }
    setEditBill(null);
  };

  const startBillReturn = function(bill) {
    setRetBill(bill);
    var qtys = {};
    bill.items.forEach(function(it, i) { qtys[i] = 0; });
    setRetQtys(qtys);
  };

  const processBillReturn = function() {
    if (!retBill) return;
    var returnItems = [];
    retBill.items.forEach(function(it, i) {
      var rq = retQtys[i] || 0;
      if (rq > 0) returnItems.push(Object.assign({}, it, { returnQty: rq }));
    });
    if (returnItems.length === 0) { alert("Set return quantities"); return; }

    askConfirm("Return " + returnItems.length + " item(s) from bill " + retBill.billNo + "?", function() {
      var refundAmt = returnItems.reduce(function(s, it) {
        var price = (it.unitPrice || it.mrp) * (1 - (it.discount || 0) / 100);
        return s + price * it.returnQty;
      }, 0);
      var ret = { id: mkId(), billNo: retBill.billNo, patient: retBill.patient, date: new Date().toISOString(), items: returnItems, refundAmount: Math.round(refundAmt * 100) / 100 };
      // Save to Firebase
      db.ref("billReturns/" + ret.id).set(ret);

      // Add stock back to inventory
      var updInv = inv.map(function(m) {
        var retItem = returnItems.find(function(ri) { return ri.mid === m.id; });
        if (!retItem) return m;
        var addBack = retItem.loose ? retItem.returnQty / (retItem.packQty || 10) : retItem.returnQty;
        return Object.assign({}, m, { stock: Math.round((m.stock + addBack) * 10000) / 10000 });
      });
      saveInv(updInv);
      setRetBill(null);
      setRetQtys({});
    });
  };

  const returnAll = function() {
    if (!retBill) return;
    var qtys = {};
    retBill.items.forEach(function(it, i) { qtys[i] = it.qty; });
    setRetQtys(qtys);
  };

  return (
    <div><h2 style={hds}>Bills ({filteredBills.length}{hFilter !== "all" ? "/" + bills.length : ""})</h2>
      <div style={{ display: "flex", gap: 3, background: "#E8E4DD", borderRadius: 7, padding: 3, marginBottom: 12, flexWrap: "wrap" }}>
        {[["all","All"],["today","Today"],["week","Week"],["month","Month"],["custom","Custom"]].map(function(x) { return <button key={x[0]} onClick={function(){setHFilter(x[0]);}} style={{ padding: "6px 12px", border: "none", borderRadius: 5, fontSize: 11.5, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", background: hFilter === x[0] ? "#fff" : "transparent", color: hFilter === x[0] ? "#0D6B5B" : "#888" }}>{x[1]}</button>; })}
      </div>
      {hFilter === "custom" && <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
        <div><label style={{ fontSize: 10, fontWeight: 600, color: "#888" }}>From</label><input type="date" value={hFrom} onChange={function(e){setHFrom(e.target.value);}} style={inps} /></div>
        <div><label style={{ fontSize: 10, fontWeight: 600, color: "#888" }}>To</label><input type="date" value={hTo} onChange={function(e){setHTo(e.target.value);}} style={inps} /></div>
      </div>}

      {retBill && (
        <div style={{ ...cds, border: "2px solid #DC2626", marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div><b style={{ color: "#DC2626" }}>Return Bill: {retBill.billNo}</b><div style={{ fontSize: 12, color: "#888" }}>Patient: {retBill.patient} | Date: {fD(retBill.date)}</div></div>
            <div style={{ display: "flex", gap: 6 }}><button onClick={returnAll} style={{ ...bts(false), padding: "5px 12px", fontSize: 11, color: "#DC2626" }}>Return All</button><button onClick={processBillReturn} style={{ border: "none", borderRadius: 7, padding: "9px 18px", fontWeight: 600, cursor: "pointer", fontSize: 13, background: "#DC2626", color: "#fff" }}>Process Return</button><button onClick={function() { setRetBill(null); }} style={bts(false)}>Cancel</button></div>
          </div>
          <div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
            {["Medicine","Type","Sold Qty","Return Qty","Price","Refund Amt"].map(function(h) { return <th key={h} style={ths}>{h}</th>; })}</tr></thead><tbody>
            {retBill.items.map(function(it, i) {
              var price = (it.unitPrice || it.mrp) * (1 - (it.discount || 0) / 100);
              return (<tr key={i}>
                <td style={{ ...tds, fontWeight: 500 }}>{it.name}</td>
                <td style={tds}>{it.loose ? <Tag bg="#FEF3C7" fg="#92400E">Loose</Tag> : <Tag bg="#DBEAFE" fg="#1E40AF">Pack</Tag>}</td>
                <td style={tds}>{it.qty}{it.loose ? " pcs" : ""}</td>
                <td style={{ padding: "4px" }}><input type="number" min="0" max={it.qty} value={retQtys[i] || 0} onChange={function(e) { setRetQtys(function(p) { var n = Object.assign({}, p); n[i] = Math.min(it.qty, Math.max(0, parseInt(e.target.value) || 0)); return n; }); }} style={{ ...smis, width: 65, textAlign: "center" }} /></td>
                <td style={tds}>Rs.{f2(price)}</td>
                <td style={{ ...tds, fontWeight: 700, color: "#DC2626" }}>Rs.{f2(price * (retQtys[i] || 0))}</td>
              </tr>);
            })}</tbody></table></div>
          <div style={{ textAlign: "right", marginTop: 8, fontSize: 14, fontWeight: 700, color: "#DC2626" }}>
            Total Refund: Rs.{f2(retBill.items.reduce(function(s, it, i) { return s + (it.unitPrice || it.mrp) * (1 - (it.discount || 0) / 100) * (retQtys[i] || 0); }, 0))}
          </div>
        </div>
      )}

      {editBill && (
        <div ref={editRef} style={{ ...cds, border: "2px solid #2563EB", marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <b style={{ color: "#2563EB" }}>Edit Bill: {editBill.billNo}</b>
            <div style={{ display: "flex", gap: 6 }}><button onClick={saveEditedBill} style={{ ...bts(true), background: "#2563EB" }}>Save</button><button onClick={() => setEditBill(null)} style={bts(false)}>Cancel</button></div></div>
          <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
            <div><label style={{ fontSize: 10, fontWeight: 600, color: "#888" }}>Patient</label><input value={editBill.patient} onChange={(e) => setEditBill((p) => ({ ...p, patient: e.target.value }))} style={inps} /></div>
            <div><label style={{ fontSize: 10, fontWeight: 600, color: "#888" }}>Doctor</label><input value={editBill.doctor || ""} onChange={(e) => setEditBill((p) => ({ ...p, doctor: e.target.value }))} style={inps} /></div>
            <div><label style={{ fontSize: 10, fontWeight: 600, color: "#888" }}>Payment</label><select value={editBill.paymentMode} onChange={(e) => setEditBill((p) => ({ ...p, paymentMode: e.target.value }))} style={{ ...inps, background: "#fff" }}>{["Cash","UPI","Card","Credit"].map((m) => <option key={m}>{m}</option>)}</select></div></div>
          <div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse", minWidth: 650 }}><thead><tr>
            {["Medicine","Qty","Price","Disc%","Disc Rs","GST%","Amt",""].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>
            {editBill.items.map((it, i) => {
              const baseAmt = (it.unitPrice || it.mrp) * it.qty;
              const discRs = it.discountRs !== undefined ? it.discountRs : baseAmt * (it.discount || 0) / 100;
              const updEditDiscPct = (pct) => { const v = Math.min(100, Math.max(0, parseFloat(pct) || 0)); const rs = Math.round(baseAmt * v / 100 * 100) / 100; const items = [...editBill.items]; items[i] = { ...items[i], discount: v, discountRs: rs }; setEditBill((p) => ({ ...p, items })); };
              const updEditDiscRs = (rs) => { const v = Math.max(0, parseFloat(rs) || 0); const pct = baseAmt > 0 ? Math.min(100, Math.round(v / baseAmt * 10000) / 100) : 0; const items = [...editBill.items]; items[i] = { ...items[i], discountRs: v, discount: pct }; setEditBill((p) => ({ ...p, items })); };
              return (
              <tr key={i}>
                <td style={{ ...tds, fontWeight: 500 }}>{it.name}{it.loose && <span style={{ color: "#B45309", fontSize: 9, marginLeft: 4 }}>[L]</span>}</td>
                <td style={{ padding: "4px" }}><input type="number" min="1" value={it.qty} onChange={(e) => { const items = [...editBill.items]; items[i] = { ...items[i], qty: Math.max(1, parseInt(e.target.value) || 1) }; setEditBill((p) => ({ ...p, items })); }} style={{ ...smis, width: 55 }} /></td>
                <td style={{ padding: "4px" }}><input type="number" min="0" step="0.01" value={it.unitPrice || it.mrp} onChange={(e) => { const items = [...editBill.items]; items[i] = { ...items[i], unitPrice: Math.max(0, parseFloat(e.target.value) || 0), mrp: Math.max(0, parseFloat(e.target.value) || 0) }; setEditBill((p) => ({ ...p, items })); }} style={{ ...smis, width: 70, textAlign: "right" }} /></td>
                <td style={{ padding: "4px" }}>
                  <input type="number" min="0" max="100" step="0.01" value={it.discount || 0} onChange={(e) => updEditDiscPct(e.target.value)} style={{ ...smis, width: 60 }} />
                  <span style={{ fontSize: 9, color: "#888", display: "block", textAlign: "center" }}>%</span>
                </td>
                <td style={{ padding: "4px" }}>
                  <input type="number" min="0" step="0.01" value={Math.round(discRs * 100) / 100} onChange={(e) => updEditDiscRs(e.target.value)} style={{ ...smis, width: 65, textAlign: "right" }} />
                  <span style={{ fontSize: 9, color: "#888", display: "block", textAlign: "center" }}>Rs.</span>
                </td>
                <td style={tds}>{it.gstRate}%</td>
                <td style={{ ...tds, fontWeight: 700 }}>Rs.{f2(baseAmt * (1 - (it.discount || 0) / 100))}</td>
                <td style={tds}><button onClick={function() { editDelItem(i); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#DC2626", fontSize: 16, fontWeight: 700, padding: 2 }}>x</button></td>
              </tr>
              );
            })}</tbody></table></div>
          <div style={{ marginTop: 10, position: "relative" }}>
            <input value={editAddQ} onChange={function(e) { setEditAddQ(e.target.value); }} placeholder="Search medicine to add..." style={{ ...inps, fontSize: 13 }} />
            {editSearchResults.length > 0 && <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "1px solid #ddd", borderRadius: 8, boxShadow: "0 4px 12px rgba(0,0,0,0.1)", maxHeight: 200, overflowY: "auto", zIndex: 10 }}>
              {editSearchResults.map(function(m) {
                return <button key={m.id} onClick={function() { editAddItem(m); }} style={{ display: "flex", justifyContent: "space-between", width: "100%", padding: "8px 12px", border: "none", borderBottom: "1px solid #f5f5f0", background: "transparent", cursor: "pointer", textAlign: "left", fontSize: 12 }}>
                  <span><b>{m.name}</b> {m.uid && <span style={{ color: "#7C3AED", fontSize: 10 }}>({m.uid})</span>} - {m.batch}</span>
                  <span style={{ color: "#0D6B5B", fontWeight: 600 }}>Rs.{f2(m.mrp)}</span>
                </button>;
              })}
            </div>}
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginTop: 10, flexWrap: "wrap", gap: 8 }}>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: "#444", display: "block", marginBottom: 6 }}>Bill Discount</label>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <div style={{ position: "relative" }}>
                  <input type="number" min="0" max="100" step="0.01"
                    value={Math.round((editBill.billDiscount || 0) / Math.max(0.01, editBill.items.reduce((s, i) => s + (i.unitPrice || i.mrp) * i.qty * (1 - (i.discount || 0) / 100), 0)) * 10000) / 100}
                    onChange={(e) => { const base = editBill.items.reduce((s, i) => s + (i.unitPrice || i.mrp) * i.qty * (1 - (i.discount || 0) / 100), 0); setEditBill((p) => ({ ...p, billDiscount: Math.round(base * (parseFloat(e.target.value) || 0) / 100 * 100) / 100 })); }}
                    style={{ ...smis, width: 75, paddingRight: 22 }} />
                  <span style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", fontSize: 11, color: "#888" }}>%</span>
                </div>
                <span style={{ fontSize: 12, color: "#888" }}>or</span>
                <div style={{ position: "relative" }}>
                  <input type="number" min="0" step="0.01" value={editBill.billDiscount || 0} onChange={(e) => setEditBill((p) => ({ ...p, billDiscount: parseFloat(e.target.value) || 0 }))} style={{ ...smis, width: 80, paddingRight: 22 }} />
                  <span style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", fontSize: 11, color: "#888" }}>₹</span>
                </div>
              </div>
            </div>
            <div style={{ fontSize: 16, fontWeight: 800, color: "#0D6B5B" }}>Net: Rs.{f2(Math.max(0, Math.round(editBill.items.reduce((s, i) => s + (i.unitPrice || i.mrp) * i.qty * (1 - (i.discount || 0) / 100), 0) - (editBill.billDiscount || 0))))}</div>
          </div>
        </div>
      )}
      {filteredBills.length === 0 ? <div style={{ ...cds, padding: 30, textAlign: "center", color: "#aaa" }}>{hFilter === "all" ? "No bills" : "No bills in this period"}</div> :
      <HistBillTable bills={filteredBills} showBill={showBill} setEditBill={doEdit} startBillReturn={startBillReturn} askConfirm={askConfirm} saveBills={saveBills} mob={mob} />}
    </div>
  );
}

function HistBillTable({ bills, showBill, setEditBill, startBillReturn, askConfirm, saveBills, mob }) {
  const [sortCol, setSortCol] = React.useState("date");
  const [sortDir, setSortDir] = React.useState("desc");
  const [expanded, setExpanded] = React.useState(null);
  const [q, setQ] = React.useState("");

  const BILL_COLS = [
    { key: "bill", label: "Bill No" }, { key: "date", label: "Date" }, { key: "patient", label: "Patient" },
    { key: "amount", label: "Amount" }, { key: "pay", label: "Payment" },
  ];
  const [colVis, setColVis] = React.useState({ bill: true, date: true, patient: true, amount: true, pay: true });
  const sh = (k) => colVis[k] !== false;

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir((d) => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("desc"); }
  };

  const SortTh = ({ col, label }) => {
    const active = sortCol === col;
    return sh(col) ? (
      <th onClick={() => toggleSort(col)} style={{ ...ths, cursor: "pointer", userSelect: "none", whiteSpace: "nowrap" }}>
        {label} {active ? (sortDir === "asc" ? "▲" : "▼") : <span style={{ opacity: 0.3 }}>⇅</span>}
      </th>
    ) : null;
  };

  let filtered = q ? bills.filter((b) => b.billNo.toLowerCase().includes(q.toLowerCase()) || b.patient.toLowerCase().includes(q.toLowerCase()) || (b.paymentMode || "").toLowerCase().includes(q.toLowerCase())) : bills;

  const sorted = [...filtered].sort((a, b) => {
    let va, vb;
    if (sortCol === "date") { va = new Date(a.date).getTime(); vb = new Date(b.date).getTime(); }
    else if (sortCol === "bill") { va = a.billNo; vb = b.billNo; }
    else if (sortCol === "patient") { va = (a.patient || "").toLowerCase(); vb = (b.patient || "").toLowerCase(); }
    else if (sortCol === "amount") { va = a.netAmount; vb = b.netAmount; }
    else if (sortCol === "pay") { va = (a.paymentMode || ""); vb = (b.paymentMode || ""); }
    else { va = 0; vb = 0; }
    if (va < vb) return sortDir === "asc" ? -1 : 1;
    if (va > vb) return sortDir === "asc" ? 1 : -1;
    return 0;
  });

  const visibleColCount = BILL_COLS.filter((c) => sh(c.key)).length + 2; // +2 for items-expand + actions

  return (
    <div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12, flexWrap: "wrap" }}>
        <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search bill no, patient, payment..." style={{ ...inps, flex: 1, minWidth: 180 }} />
        {!mob && <ColToggle cols={BILL_COLS} visible={colVis} setVisible={setColVis} />}
      </div>

      {/* Mobile card view */}
      {mob && <div>
        {sorted.map(function(b) {
          return <div key={b.billNo} style={{ ...cds, padding: 12, marginBottom: 8, borderLeft: "3px solid #0D6B5B" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div><div style={{ fontFamily: "monospace", fontWeight: 700, color: "#0D6B5B", fontSize: 14 }}>{b.billNo}</div>
                <div style={{ fontSize: 11, color: "#888" }}>{b.dateIST || fDT(b.date)}</div></div>
              <div style={{ textAlign: "right" }}><div style={{ fontWeight: 800, fontSize: 16, color: "#0C2E24" }}>Rs.{f2(b.netAmount)}</div>
                <Tag bg={b.paymentMode === "Cash" ? "#D1FAE5" : "#DBEAFE"} fg={b.paymentMode === "Cash" ? "#065F46" : "#1E40AF"}>{b.paymentMode}</Tag></div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 6, fontSize: 12 }}>
              <span><b>{b.patient}</b></span>
              <span style={{ color: "#888" }}>{b.items.length} item(s)</span>
            </div>
            <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
              <button onClick={function(){showBill(b, true);}} style={{ ...bts(true), padding: "7px 14px", fontSize: 12, flex: 1 }}>View</button>
              <button onClick={function(){setEditBill(b);}} style={{ ...bts(false), padding: "7px 14px", fontSize: 12, flex: 1 }}>Edit</button>
              <button onClick={function(){startBillReturn(b);}} style={{ border: "none", borderRadius: 7, padding: "7px 14px", fontWeight: 600, cursor: "pointer", fontSize: 12, background: "#DC2626", color: "#fff", flex: 1 }}>Return</button>
            </div>
          </div>;
        })}
      </div>}

      {/* Desktop table view */}
      {!mob && <div style={{ ...cds, padding: 0, overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 300 }}>
            <thead><tr>
              <SortTh col="bill" label="Bill" />
              <SortTh col="date" label="Date" />
              <SortTh col="patient" label="Patient" />
              <SortTh col="amount" label="Amount" />
              <SortTh col="pay" label="Pay" />
              <th style={ths}>Items</th>
              <th style={ths}></th>
              <th style={ths}></th>
              <th style={ths}></th>
            </tr></thead>
            <tbody>
              {sorted.map((b) => {
                const isOpen = expanded === b.billNo;
                return (
                  <React.Fragment key={b.billNo}>
                    <tr style={{ background: isOpen ? "#F0FDF4" : "transparent" }}>
                      {sh("bill") && <td style={{ ...tds, fontFamily: "monospace", fontWeight: 600, color: "#0D6B5B" }}>{b.billNo}</td>}
                      {sh("date") && <td style={tds}>{b.dateIST || fDT(b.date)}</td>}
                      {sh("patient") && <td style={{ ...tds, fontWeight: 500 }}>{b.patient}</td>}
                      {sh("amount") && <td style={{ ...tds, fontWeight: 700 }}>Rs.{f2(b.netAmount)}</td>}
                      {sh("pay") && <td style={tds}><Tag bg={b.paymentMode === "Cash" ? "#D1FAE5" : "#DBEAFE"} fg={b.paymentMode === "Cash" ? "#065F46" : "#1E40AF"}>{b.paymentMode}</Tag></td>}
                      <td style={tds}><button onClick={() => setExpanded(isOpen ? null : b.billNo)} style={{ ...bts(false), padding: "4px 10px", fontSize: 11, background: isOpen ? "#D1FAE5" : undefined, color: isOpen ? "#065F46" : undefined }}>{isOpen ? "▲ Hide" : "▼ " + b.items.length + " items"}</button></td>
                      <td style={tds}><button onClick={() => showBill(b, true)} style={{ ...bts(true), padding: "5px 12px", fontSize: 11 }}>View</button></td>
                      <td style={tds}><button onClick={() => setEditBill(b)} style={{ ...bts(false), padding: "5px 12px", fontSize: 11 }}>Edit</button></td>
                      <td style={tds}><button onClick={function() { startBillReturn(b); }} style={{ border: "none", borderRadius: 7, padding: "5px 12px", fontWeight: 600, cursor: "pointer", fontSize: 11, background: "#DC2626", color: "#fff" }}>Return</button></td>
                    </tr>
                    {isOpen && (
                      <tr>
                        <td colSpan={visibleColCount + 3} style={{ padding: "0 0 10px 0", background: "#F0FDF4" }}>
                          <div style={{ overflowX: "auto", padding: "8px 12px" }}>
                            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                              <thead><tr>
                                {["Medicine","Batch","Qty","Price","Purchase Bill","Distributor","Purchase Date"].map((h) => <th key={h} style={{ ...ths, fontSize: 11, background: "#DCFCE7" }}>{h}</th>)}
                              </tr></thead>
                              <tbody>
                                {b.items.map((it, i) => (
                                  <tr key={i}>
                                    <td style={{ ...tds, fontWeight: 500 }}>{it.name}{it.loose ? <span style={{ color: "#B45309", fontSize: 10, marginLeft: 4 }}>[Loose]</span> : ""}</td>
                                    <td style={{ ...tds, fontFamily: "monospace", fontSize: 11 }}>{it.batch || "-"}</td>
                                    <td style={tds}>{it.qty}{it.loose ? " pcs" : ""}</td>
                                    <td style={tds}>Rs.{f2(it.unitPrice || it.mrp)}</td>
                                    <td style={{ ...tds, fontFamily: "monospace", fontSize: 11, color: "#0D6B5B", fontWeight: 600 }}>{it.purchaseBillNo || <span style={{ color: "#bbb" }}>-</span>}</td>
                                    <td style={{ ...tds, fontSize: 11 }}>{it.purchaseDistributor || <span style={{ color: "#bbb" }}>-</span>}</td>
                                    <td style={{ ...tds, fontSize: 11, color: "#888" }}>{it.purchaseDate ? fD(it.purchaseDate) : <span style={{ color: "#bbb" }}>-</span>}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>}
    </div>
  );
}

// USERS PAGE
// ══════════════════════════════════════════════
function UsersPage({ sessions, mob }) {
  return (
    <div><h2 style={hds}>Users and Sessions</h2>
      <div style={cds}>
        <b>Login Accounts</b>
        <p style={{ fontSize: 12, color: "#888", margin: "8px 0" }}>Manage users in Firebase Console &gt; Authentication &gt; Users</p>
        <div style={{ overflowX: "auto", marginTop: 10 }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
          {["Email","Role"].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>

  );
}

// ══════════════════════════════════════════════
// PURCHASE TRACEABILITY MIGRATION HELPER
// ══════════════════════════════════════════════
function runPurchaseTraceMigration(data) {
  var purch = data.purch || [];
  var inv = (data.inv || []).map(function(m) { return Object.assign({}, m); });
  var bills = (data.bills || []).map(function(b) { return Object.assign({}, b, { items: (b.items || []).map(function(i) { return Object.assign({}, i); }) }); });

  // Build lookup: { "name_lower||batch": purchase }
  // If multiple purchases match same name+batch, pick latest by date
  var purchLookup = {};
  purch.forEach(function(pur) {
    (pur.items || []).forEach(function(it) {
      var key = (it.name || "").toLowerCase().trim() + "||" + (it.batch || "").trim();
      var existing = purchLookup[key];
      if (!existing || new Date(pur.date) > new Date(existing.date)) {
        purchLookup[key] = { purchaseBillNo: pur.invoiceNo || "", purchaseDistributor: pur.supplier || "", purchaseDate: pur.date || "", purchaseId: pur.id || "" };
      }
    });
  });

  var invMatched = 0, invSkipped = 0;
  inv = inv.map(function(m) {
    if (m.purchaseBillNo) { invSkipped++; return m; } // already has data
    var key = (m.name || "").toLowerCase().trim() + "||" + (m.batch || "").trim();
    var match = purchLookup[key];
    if (match) { invMatched++; return Object.assign({}, m, match); }
    // Try name-only match as fallback
    var nameKey = (m.name || "").toLowerCase().trim() + "||";
    var fallback = purchLookup[nameKey];
    if (!fallback) {
      // scan for name-only
      for (var k in purchLookup) {
        if (k.split("||")[0] === (m.name || "").toLowerCase().trim()) { fallback = purchLookup[k]; break; }
      }
    }
    if (fallback) { invMatched++; return Object.assign({}, m, fallback); }
    invSkipped++;
    return m;
  });

  var billItemsMatched = 0, billItemsSkipped = 0;
  bills = bills.map(function(b) {
    var items = (b.items || []).map(function(it) {
      if (it.purchaseBillNo) { billItemsSkipped++; return it; }
      var key = (it.name || "").toLowerCase().trim() + "||" + (it.batch || "").trim();
      var match = purchLookup[key];
      if (match) { billItemsMatched++; return Object.assign({}, it, match); }
      for (var k in purchLookup) {
        if (k.split("||")[0] === (it.name || "").toLowerCase().trim()) { billItemsMatched++; return Object.assign({}, it, purchLookup[k]); }
      }
      billItemsSkipped++;
      return it;
    });
    return Object.assign({}, b, { items: items });
  });

  return { inv, bills, purch: data.purch, returns: data.returns, billReturns: data.billReturns, racks: data.racks, v: data.v, date: data.date,
    _migrationStats: { invMatched, invSkipped, billItemsMatched, billItemsSkipped } };
}
