function useM() { const [m, s] = useState(window.innerWidth < 768); useEffect(() => { const h = () => s(window.innerWidth < 768); window.addEventListener("resize", h); return () => window.removeEventListener("resize", h); }, []); return m; }

// ══════════════════════════════════════════════
// FIREBASE DATABASE HELPERS (real-time sync)
// ══════════════════════════════════════════════
function fbSet(path, data) {
  return db.ref(path).set(data).catch((e) => console.error("DB write error:", path, e));
}
function fbGet(path) {
  return db.ref(path).once("value").then((snap) => snap.val()).catch(() => null);
}
function fbListen(path, callback) {
  const ref = db.ref(path);
  ref.on("value", (snap) => { callback(snap.val()); });
  return () => ref.off("value");
}

// ══════════════════════════════════════════════
// CSV PARSER
// ══════════════════════════════════════════════
function parseCSV(t) { const res = []; let row = [], f = "", q = false; for (let i = 0; i < t.length; i++) { const c = t[i]; if (c === "\"") { q = !q; continue; } if (c === "," && !q) { row.push(f.trim()); f = ""; continue; } if ((c === "\n" || c === "\r") && !q) { if (f || row.length) { row.push(f.trim()); res.push(row); row = []; f = ""; } continue; } f += c; } if (f || row.length) { row.push(f.trim()); res.push(row); } return res; }
function csvToItems(rows) {
  if (rows.length < 2) return null; const h = rows[0].map((x) => x.toLowerCase().trim()); const ix = (n) => h.findIndex((x) => x.includes(n));
  const items = [], sup = (rows[1] && rows[1][ix("seller name")]) || (rows[1] && rows[1][ix("seller")]) || "Unknown", inv = (rows[1] && rows[1][ix("invoice")]) || "", dt = (rows[1] && rows[1][ix("date")]) || "";
  for (let i = 1; i < rows.length; i++) { const r = rows[i]; if (!r || r.length < 5) continue; const g = (n) => r[ix(n)] || "", gn = (n) => parseFloat(r[ix(n)]) || 0;
    items.push({ name: g("description") || g("name"), manufacturer: g("mfg"), hsn: g("hsn") || "300490", batch: g("batch"), expiry: g("expiry"), pack: g("pkg") || g("pack"), mrp: gn("mrp"), qty: gn("qty"), ptr: gn("ptr"), gstRate: gn("cgst") ? gn("cgst") * 2 : 5, rack: "", packQty: 0, discPct: gn("disc"), schemePct: 0, freeQty: 0, amount: gn("linetotal") || 0 }); }
  return { supplier: sup, invoiceNo: inv, date: dt, items: items.filter((i) => i.name) };
}

// ══════════════════════════════════════════════
// LOGIN (Firebase Auth)
// ══════════════════════════════════════════════
function Login({ onLogin }) {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);
  const go = async () => {
    setLoading(true); setErr("");
    try {
      const cred = await auth.signInWithEmailAndPassword(email, pass);
      const role = ROLES[cred.user.email] || "staff";
      const name = ROLE_NAMES[cred.user.email] || email;
      onLogin({ id: cred.user.uid, email: cred.user.email, name, role });
    } catch (e) {
      setErr(e.message.includes("user-not-found") ? "User not found" : e.message.includes("wrong-password") ? "Wrong password" : "Login failed: " + e.message);
    }
    setLoading(false);
  };
  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0C2E24,#1A5744,#0C2E24)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: "#fff", borderRadius: 16, padding: 36, width: "100%", maxWidth: 400, boxShadow: "0 20px 60px rgba(0,0,0,.3)" }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ width: 56, height: 56, background: "linear-gradient(135deg,#0D6B5B,#34D399)", borderRadius: 14, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 26, marginBottom: 12 }}>💊</div>
          <div style={{ fontSize: 22, fontWeight: 800, fontFamily: "'Playfair Display',serif", color: "#0C2E24" }}>A to Z Pharmacy</div>
          <div style={{ fontSize: 12.5, color: "#999", marginTop: 4 }}>Management System</div></div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div><label style={{ fontSize: 11, fontWeight: 600, color: "#888", display: "block", marginBottom: 4 }}>Email</label>
            <input value={email} onChange={(e) => { setEmail(e.target.value); setErr(""); }} placeholder="owner@atozpharmacy.com" onKeyDown={(e) => e.key === "Enter" && go()} style={{ ...inps, padding: "12px 14px", fontSize: 15 }} /></div>
          <div><label style={{ fontSize: 11, fontWeight: 600, color: "#888", display: "block", marginBottom: 4 }}>Password</label>
            <input type="password" value={pass} onChange={(e) => { setPass(e.target.value); setErr(""); }} placeholder="Password" onKeyDown={(e) => e.key === "Enter" && go()} style={{ ...inps, padding: "12px 14px", fontSize: 15 }} /></div>
          {err && <div style={{ color: "#DC2626", fontSize: 12.5, textAlign: "center" }}>{err}</div>}
          <button onClick={go} disabled={loading} style={{ ...bts(true), padding: 13, fontSize: 15, width: "100%", opacity: loading ? 0.6 : 1 }}>{loading ? "Signing in..." : "Sign In"}</button></div>
        <div style={{ marginTop: 20, paddingTop: 16, borderTop: "1px solid #eee", textAlign: "center", fontSize: 11, color: "#bbb" }}><b>Owner:</b> owner@atozpharmacy.com<br/><b>Staff:</b> staff@atozpharmacy.com</div>
      </div></div>
  );
}

// ══════════════════════════════════════════════
// PURCHASE AMOUNT CALC
// ══════════════════════════════════════════════
function purchCalcAmt(it) {
  const base = (it.ptr || 0) * (it.qty || 0);
  const afterDisc = base * (1 - (it.discPct || 0) / 100);
  const afterScheme = afterDisc * (1 - (it.schemePct || 0) / 100);
  const withGst = afterScheme * (1 + (it.gstRate || 0) / 100);
  return Math.round(withGst * 100) / 100;
}

// INVENTORY PAGE (with bulk CSV import)

function InvPage({ inv, saveInv, isO, mob, askConfirm }) {
  const [q, setQ] = useState(""); const [sf, setSf] = useState(false); const [ed, setEd] = useState(null);
  const [showBulk, setShowBulk] = useState(false); const [templateLink, setTemplateLink] = useState(null);
  const bulkRef = useRef(null);
  const blank = { name: "", manufacturer: "", hsn: "300490", batch: "", expiry: "", pack: "", mrp: 0, ptr: 0, stock: 0, gstRate: 5, rack: "", distributor: "", packQty: 0 };
  const [fm, setFm] = useState(blank);
  const list = inv.filter((m) => { const s = q.toLowerCase(); return m.name.toLowerCase().includes(s) || m.batch.toLowerCase().includes(s) || (m.distributor || "").toLowerCase().includes(s) || (m.uid || "").toLowerCase().includes(s); });

  const prepareTemplate = () => {
    const csv = "Name,Manufacturer,HSN,Batch,Expiry,Pack,MRP,PTR,Stock,GST%,Rack,Distributor,PackQty\nParacetamol 500mg,Cipla,300490,PC2401,2027-06,10 Tab,18.50,14.20,100,12,A1,ABC Dist,10\n";
    setTemplateLink(URL.createObjectURL(new Blob([csv], { type: "text/csv" })));
  };
  const handleBulkCSV = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const rows = parseCSV(ev.target.result); if (rows.length < 2) { alert("No data"); return; }
      const h = rows[0].map((x) => x.toLowerCase().trim()); const ix = (n) => h.findIndex((x) => x.includes(n));
      const newItems = [];
      for (let i = 1; i < rows.length; i++) { const r = rows[i]; if (!r || r.length < 3) continue;
        const g = (n) => (r[ix(n)] || "").trim(); const gn = (n) => parseFloat(r[ix(n)]) || 0;
        const name = g("name"); if (!name) continue; const batch = g("batch") || "BULK" + i;
        if (inv.find((m) => m.name.toLowerCase() === name.toLowerCase() && m.batch === batch)) continue;
        newItems.push({ id: mkId(), name, manufacturer: g("manufacturer") || g("mfg") || "", hsn: g("hsn") || "300490", batch, expiry: g("expiry") || "", pack: g("pack") || "",
          mrp: gn("mrp"), ptr: gn("ptr"), stock: gn("stock") || gn("qty"), gstRate: gn("gst") || gn("gstrate") || 5, rack: g("rack"), distributor: g("distributor") || "",
          packQty: gn("packqty") || 0, addedFrom: "csv", uid: mkUID() }); }
      if (!newItems.length) { alert("No new items (all duplicates or empty)"); return; }
      saveInv([...inv, ...newItems]); alert("Added " + newItems.length + " medicines");
    }; reader.readAsText(file); e.target.value = "";
  };

  const doSave = () => { if (!fm.name || !fm.batch) { alert("Name and Batch required"); return; }
    if (ed) saveInv(inv.map((m) => m.id === ed ? { ...fm, id: ed, uid: m.uid || mkUID() } : m));
    else saveInv([...inv, { ...fm, id: mkId(), addedFrom: "manual", uid: mkUID() }]);
    setSf(false); setEd(null); setFm(blank); };
  const doDelete = (id) => { askConfirm("Delete this medicine?", () => saveInv(inv.filter((x) => x.id !== id))); };

  return (
    <div><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
      <h2 style={{ ...hds, marginBottom: 0 }}>Inventory ({inv.length})</h2>
      <div style={{ display: "flex", gap: 6 }}>
        <button onClick={() => setShowBulk(!showBulk)} style={{ ...bts(false), fontSize: 12 }}>CSV Import</button>
        <button onClick={() => { setFm(blank); setEd(null); setSf(!sf); }} style={bts(true)}>+ Add</button></div></div>
      {showBulk && <div style={{ ...cds, border: "2px solid #2563EB" }}>
        <b style={{ color: "#2563EB" }}>Bulk CSV Import</b>
        <p style={{ fontSize: 12, color: "#888", margin: "8px 0" }}>1. Download template  2. Fill in medicines  3. Upload</p>
        <div style={{ display: "flex", gap: 10, marginTop: 10, alignItems: "center" }}>
          {!templateLink && <button onClick={prepareTemplate} style={{ ...bts(false), fontSize: 12 }}>Prepare Template</button>}
          {templateLink && <a href={templateLink} download="AtoZ_Inventory_Template.csv" style={{ padding: "8px 16px", background: "#059669", color: "#fff", borderRadius: 7, fontSize: 12, fontWeight: 600, textDecoration: "none" }}>Download Template</a>}
          <input ref={bulkRef} type="file" accept=".csv" onChange={handleBulkCSV} style={{ display: "none" }} />
          <button onClick={() => bulkRef.current && bulkRef.current.click()} style={{ ...bts(true), fontSize: 12 }}>Upload CSV</button></div></div>}
      <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search name, batch, UID, distributor..." style={{ ...inps, marginBottom: 14 }} />
      {sf && <div style={{ ...cds, border: "2px solid #0D6B5B" }}><b style={{ color: "#0D6B5B" }}>{ed ? "Edit" : "Add"} Medicine</b>
        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "1fr 1fr 1fr 1fr", gap: 10, marginTop: 12 }}>
          {[["name","Name*"],["manufacturer","Mfg"],["batch","Batch*"],["expiry","Expiry"],["pack","Pack"],["rack","Rack"],["distributor","Distributor"],["hsn","HSN"]].map(([k, l]) => <div key={k}><label style={{ fontSize: 10, fontWeight: 600, color: "#888" }}>{l}</label><input value={fm[k] || ""} onChange={(e) => setFm((f) => ({ ...f, [k]: e.target.value }))} style={inps} /></div>)}
          {[["mrp","MRP"],["ptr","PTR"],["stock","Stock"],["gstRate","GST%"],["packQty","Pack Qty"]].map(([k, l]) => <div key={k}><label style={{ fontSize: 10, fontWeight: 600, color: "#888" }}>{l}</label><input type="number" value={fm[k] || 0} onChange={(e) => setFm((f) => ({ ...f, [k]: Number(e.target.value) }))} style={inps} /></div>)}
        </div><div style={{ display: "flex", gap: 8, marginTop: 12 }}><button onClick={doSave} style={bts(true)}>Save</button><button onClick={() => setSf(false)} style={bts(false)}>Cancel</button></div></div>}
      <div style={{ ...cds, padding: 0, overflow: "hidden" }}><div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse", minWidth: 800 }}><thead><tr>
        {["UID","Name","Batch","Exp","MRP",...(isO ? ["PTR"] : []),"Stock","Rack","Distributor","Src",""].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>
        {list.map((m) => (<tr key={m.id}>
          <td style={{ ...tds, fontFamily: "monospace", fontSize: 10, color: "#7C3AED", fontWeight: 600 }}>{m.uid || "-"}</td>
          <td style={{ ...tds, fontWeight: 500, whiteSpace: "nowrap" }}>{m.name}</td>
          <td style={{ ...tds, fontFamily: "monospace", fontSize: 11 }}>{m.batch}</td><td style={tds}>{m.expiry || "-"}</td>
          <td style={{ ...tds, fontWeight: 600 }}>Rs.{f2(m.mrp)}</td>
          {isO && <td style={{ ...tds, color: "#B45309" }}>Rs.{f2(m.ptr)}</td>}
          <td style={tds}><span style={{ fontWeight: 700, color: m.stock < 15 ? "#DC2626" : m.stock < 40 ? "#D97706" : "#065F46" }}>{m.stock}</span></td>
          <td style={tds}>{m.rack || "-"}</td>
          <td style={{ ...tds, fontSize: 11, color: "#888" }}>{m.distributor || "-"}</td>
          <td style={tds}><Tag bg={m.addedFrom === "csv" ? "#DBEAFE" : m.addedFrom === "image" ? "#FEE2E2" : "#E8E4DD"} fg={m.addedFrom === "csv" ? "#1E40AF" : m.addedFrom === "image" ? "#991B1B" : "#555"}>{(m.addedFrom || "M").slice(0, 3).toUpperCase()}</Tag></td>
          <td style={{ ...tds, whiteSpace: "nowrap" }}>
            <button onClick={() => { setFm(m); setEd(m.id); setSf(true); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#2563EB", fontSize: 11 }}>Edit</button>
            {isO && <button onClick={() => doDelete(m.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#DC2626", fontSize: 11, marginLeft: 4 }}>Del</button>}</td></tr>))}</tbody></table></div>
      {list.length === 0 && <div style={{ padding: 20, textAlign: "center", color: "#aaa", fontSize: 12 }}>No items</div>}</div></div>
  );
}

function BillPage({ inv, saveInv, addBill, mob, showBill }) {
  const [pt, setPt] = useState(""); const [pc, setPc] = useState(""); const [pa, setPa] = useState(""); const [doc, setDoc] = useState(""); const [dc, setDc] = useState(""); const [pm, setPm] = useState("Cash");
  const [items, setItems] = useState([]); const [sq, setSq] = useState(""); const [so, setSo] = useState(false); const [billDisc, setBillDisc] = useState(0);
  const [scanning, setScanning] = useState(false);
  const [scanResult, setScanResult] = useState(null);
  const camRef = useRef(null);
  const res = sq.length >= 1 ? inv.filter((m) => { const s = sq.toLowerCase(); return (m.name.toLowerCase().includes(s) || m.batch.toLowerCase().includes(s) || (m.uid || "") === sq.toUpperCase() || (m.uid || "").toLowerCase().includes(s)) && m.stock > 0; }).slice(0, 8) : [];
  const addIt = (med) => { const ex = items.findIndex((i) => i.mid === med.id && !i.loose); if (ex >= 0) setItems((p) => p.map((i, idx) => idx === ex ? { ...i, qty: i.qty + 1 } : i)); else setItems((p) => [...p, { mid: med.id, name: med.name, manufacturer: med.manufacturer || "", pack: med.pack || "", batch: med.batch, expiry: med.expiry, mrp: med.mrp, ptr: med.ptr || 0, gstRate: med.gstRate || 5, qty: 1, discount: 0, loose: false, packQty: med.packQty || 0, unitPrice: med.mrp, unitPtr: med.ptr || 0, uid: med.uid || "" }]); setSq(""); setSo(false); };

  // Camera scan - reads medicine strip/box image and matches to inventory
  const doScan = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    if (!PROXY_READY) { alert("Image AI not configured. See PROXY_SETUP guide to enable."); return; }
    setScanning(true); setScanResult(null);
    try {
      const b64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = rej; r.readAsDataURL(file); });
      const resp = await fetch(PROXY_URL, { method: "POST", headers: CLAUDE_HEADERS,
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: file.type || "image/jpeg", data: b64 } },
            { type: "text", text: "You are a pharmacy medicine identifier. Look at this medicine strip/box image and extract: Name (full name with strength like Paracetamol 500mg), Manufacturer, Batch number, Expiry (YYYY-MM), Pack (like 10 Tab), MRP (number only). Return ONLY valid JSON no markdown: {\"name\":\"\",\"manufacturer\":\"\",\"batch\":\"\",\"expiry\":\"\",\"pack\":\"\",\"mrp\":0}" }
          ] }] }) });
      const data = await resp.json();
      if (data.error) { setScanResult({ type: "err", msg: "API error: " + (data.error.message || "Unknown") }); setScanning(false); return; }
      let text = (data.content || []).map((c) => c.text || "").join("").trim();
      if (text.indexOf("{") > 0) text = text.slice(text.indexOf("{"), text.lastIndexOf("}") + 1);
      const parsed = JSON.parse(text);
      const medName = (parsed.name || "").toLowerCase();
      const match = inv.find((m) => m.stock > 0 && (
        m.name.toLowerCase() === medName ||
        m.name.toLowerCase().includes(medName) ||
        medName.includes(m.name.toLowerCase()) ||
        (parsed.batch && m.batch === parsed.batch)
      ));
      if (match) {
        addIt(match);
        setScanResult({ type: "ok", msg: "Found: " + match.name + " (Stock: " + match.stock + ")" });
      } else {
        setScanResult({ type: "info", msg: "Read: " + (parsed.name || "Unknown") + " | MRP: " + (parsed.mrp || "?") + " | Batch: " + (parsed.batch || "?") + " - Not found in inventory." });
        if (parsed.name) setSq(parsed.name);
      }
    } catch (err) {
      console.error(err);
      setScanResult({ type: "err", msg: "Could not read medicine. Try clearer image." });
    }
    setScanning(false);
    e.target.value = "";
  };

  const toggleLoose = (idx) => { setItems((p) => p.map((it, i) => { if (i !== idx) return it; const loose = !it.loose; const pq = it.packQty || 10; const foundM = inv.find((m) => m.id === it.mid); const origMrp = foundM ? foundM.mrp : it.mrp; const origPtr = foundM ? foundM.ptr : it.ptr; return { ...it, loose, unitPrice: loose ? it.mrp / pq : origMrp, unitPtr: loose ? (it.ptr || 0) / pq : origPtr, qty: 1 }; })); };
  const ca = (i) => { const price = i.unitPrice * i.qty; return price - price * i.discount / 100; };
  const tMRP = items.reduce((s, i) => s + i.unitPrice * i.qty, 0), tDisc = items.reduce((s, i) => s + i.unitPrice * i.qty * i.discount / 100, 0);
  const tGST = items.reduce((s, i) => { const a = ca(i); return s + (a - a / (1 + i.gstRate / 100)); }, 0);
  const net = Math.max(0, Math.round(tMRP - tDisc - billDisc));

  const gen = () => { if (!pt || !items.length) { alert("Add patient and items"); return; }
    const bill = { billNo: mkBill(), date: new Date().toISOString(), patient: pt, patientContact: pc, patientAddress: pa, doctor: doc, doctorContact: dc, paymentMode: pm, items: items.map((i) => ({ ...i, amount: ca(i) })), totalMRP: tMRP, totalDiscount: tDisc, billDiscount: billDisc, netAmount: net, cgst: tGST / 2, sgst: tGST / 2 };
    const updInv = inv.map((m) => { const sold = items.filter((i) => i.mid === m.id); if (!sold.length) return m; const totalSold = sold.reduce((s, i) => i.loose ? s + Math.ceil(i.qty / (i.packQty || 10)) : s + i.qty, 0); return { ...m, stock: Math.max(0, m.stock - totalSold) }; });
    saveInv(updInv); addBill(bill); showBill(bill); setPt(""); setPc(""); setPa(""); setDoc(""); setDc(""); setItems([]); setPm("Cash"); setBillDisc(0); };

  return (
    <div><h2 style={hds}>New Bill</h2>
      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 14, marginBottom: 14 }}>
        <div style={cds}><b style={{ color: "#0D6B5B", fontSize: 13 }}>Patient</b><div style={{ display: "grid", gap: 8, marginTop: 10 }}><input value={pt} onChange={(e) => setPt(e.target.value)} placeholder="Patient Name *" style={inps} /><input value={pc} onChange={(e) => setPc(e.target.value)} placeholder="Contact" style={inps} /><input value={pa} onChange={(e) => setPa(e.target.value)} placeholder="Address" style={inps} /></div></div>
        <div style={cds}><b style={{ color: "#0D6B5B", fontSize: 13 }}>Doctor and Payment</b><div style={{ display: "grid", gap: 8, marginTop: 10 }}><input value={doc} onChange={(e) => setDoc(e.target.value)} placeholder="Doctor" style={inps} /><input value={dc} onChange={(e) => setDc(e.target.value)} placeholder="Doctor Contact" style={inps} /><select value={pm} onChange={(e) => setPm(e.target.value)} style={{ ...inps, background: "#fff" }}>{["Cash","UPI","Card","Credit"].map((m) => <option key={m}>{m}</option>)}</select></div></div></div>
      <div style={cds}><b style={{ color: "#0D6B5B", fontSize: 13 }}>Add Medicines</b>
        <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap", alignItems: "center" }}>
          <div style={{ flex: 1, position: "relative", minWidth: 200 }}>
            <input value={sq} onChange={(e) => { setSq(e.target.value); setSo(true); }} onFocus={() => setSo(true)} onBlur={() => setTimeout(() => setSo(false), 200)} placeholder="Name or UID..." style={{ ...inps, fontSize: 15, padding: "12px 14px", border: "2px solid #D4D0C8" }} />
            {so && res.length > 0 && <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "1px solid #ddd", borderRadius: 8, boxShadow: "0 8px 24px rgba(0,0,0,.12)", maxHeight: 220, overflowY: "auto", zIndex: 100 }}>
              {res.map((m) => (<button key={m.id} onClick={() => addIt(m)} style={{ display: "flex", justifyContent: "space-between", width: "100%", padding: "10px 14px", border: "none", borderBottom: "1px solid #f5f5f0", background: "transparent", cursor: "pointer", textAlign: "left", fontSize: 13 }}><span><b>{m.name}</b> {m.uid && <span style={{ color: "#7C3AED", fontSize: 10 }}>({m.uid})</span>} - {m.batch} (Stock:{m.stock})</span><span style={{ color: "#0D6B5B", fontWeight: 600, whiteSpace: "nowrap", marginLeft: 8 }}>Rs.{f2(m.mrp)}</span></button>))}</div>}</div>
          <div>
            <input ref={camRef} type="file" accept="image/*" onChange={doScan} style={{ display: "none" }} />
            <button onClick={() => camRef.current && camRef.current.click()} disabled={scanning} style={{ ...bts(false), padding: "12px 16px", fontSize: 13, opacity: scanning ? 0.6 : 1 }}>{scanning ? "Reading..." : "📷 Scan / Upload"}</button>
          </div>
        </div>
        {scanning && <div style={{ marginTop: 10, padding: 12, background: "#EFF6FF", borderRadius: 8, fontSize: 13, color: "#1E40AF", display: "flex", alignItems: "center", gap: 8 }}><span style={{ display: "inline-block", width: 16, height: 16, border: "2px solid #1E40AF", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.7s linear infinite" }}></span> AI is reading the medicine strip...</div>}
        {scanResult && <div style={{ marginTop: 10, padding: 12, borderRadius: 8, fontSize: 12.5, background: scanResult.type === "ok" ? "#D1FAE5" : scanResult.type === "err" ? "#FEE2E2" : "#FEF3C7", color: scanResult.type === "ok" ? "#065F46" : scanResult.type === "err" ? "#991B1B" : "#92400E" }}>
          {scanResult.type === "ok" && "✅ "}{scanResult.type === "err" && "❌ "}{scanResult.type === "info" && "ℹ️ "}{scanResult.msg}
          <button onClick={() => setScanResult(null)} style={{ marginLeft: 8, background: "none", border: "none", cursor: "pointer", fontSize: 14, opacity: 0.6 }}>x</button>
        </div>}
        {items.length > 0 && <div>
          <div style={{ overflowX: "auto", marginTop: 14 }}><table style={{ width: "100%", borderCollapse: "collapse", minWidth: 650 }}><thead><tr>{["#","Medicine","UID","Type","Price","Qty","Disc%","GST","Amt",""].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>
            {items.map((it, i) => (<tr key={i} style={{ background: it.loose ? "#FFF7ED" : "transparent" }}>
              <td style={tds}>{i + 1}</td><td style={{ ...tds, fontWeight: 500 }}>{it.name}</td>
              <td style={{ ...tds, fontFamily: "monospace", fontSize: 10, color: "#7C3AED" }}>{it.uid || "-"}</td>
              <td style={tds}><button onClick={() => toggleLoose(i)} style={{ padding: "3px 8px", fontSize: 10, borderRadius: 4, border: "none", cursor: "pointer", fontWeight: 600, background: it.loose ? "#FDBA74" : "#E8E4DD", color: it.loose ? "#7C2D12" : "#555" }}>{it.loose ? "LOOSE" : "FULL"}</button></td>
              <td style={tds}>Rs.{f2(it.unitPrice)}{it.loose && <span style={{ fontSize: 9, color: "#B45309" }}>/pc</span>}</td>
              <td style={{ padding: "4px" }}><input type="number" min="1" value={it.qty} onChange={(e) => setItems((p) => p.map((x, idx) => idx === i ? { ...x, qty: Math.max(1, parseInt(e.target.value) || 1) } : x))} style={{ ...smis, width: 55, textAlign: "center" }} /></td>
              <td style={{ padding: "4px" }}><input type="number" min="0" max="100" value={it.discount} onChange={(e) => setItems((p) => p.map((x, idx) => idx === i ? { ...x, discount: Math.min(100, Math.max(0, parseFloat(e.target.value) || 0)) } : x))} style={{ ...smis, width: 55, textAlign: "center" }} /></td>
              <td style={tds}>{it.gstRate}%</td><td style={{ ...tds, fontWeight: 700, color: "#0D6B5B" }}>Rs.{f2(ca(it))}</td>
              <td style={tds}><button onClick={() => setItems((p) => p.filter((_, idx) => idx !== i))} style={{ background: "none", border: "none", cursor: "pointer", color: "#DC2626", fontSize: 16 }}>x</button></td></tr>))}</tbody></table></div>
          <div style={{ display: "flex", gap: 14, marginTop: 14, flexDirection: mob ? "column" : "row" }}>
            <div style={{ flex: 1, background: "#FAFAF7", borderRadius: 8, padding: 14, fontSize: 12 }}>
              <div style={{ fontWeight: 600, color: "#888", fontSize: 11, marginBottom: 4 }}>GST: CGST Rs.{f2(tGST / 2)} + SGST Rs.{f2(tGST / 2)} = Rs.{f2(tGST)}</div>
              <div style={{ marginTop: 8 }}><label style={{ fontSize: 11, fontWeight: 600, color: "#888" }}>Bill Discount (Rs.)</label>
                <input type="number" min="0" value={billDisc} onChange={(e) => setBillDisc(Math.max(0, parseFloat(e.target.value) || 0))} style={{ ...smis, marginTop: 4 }} /></div></div>
            <div style={{ width: mob ? "100%" : 280, background: "#0C2E24", borderRadius: 10, padding: 18, color: "#fff" }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, opacity: .7 }}><span>Total</span><span>Rs.{f2(tMRP)}</span></div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, opacity: .7 }}><span>Item Disc</span><span>-Rs.{f2(tDisc)}</span></div>
              {billDisc > 0 && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, opacity: .7 }}><span>Bill Disc</span><span>-Rs.{f2(billDisc)}</span></div>}
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: mob ? 16 : 18, fontWeight: 800, borderTop: "1px solid rgba(255,255,255,.15)", paddingTop: 10, marginTop: 8, fontFamily: "'Playfair Display',serif" }}><span>Net</span><span>Rs.{f2(net)}</span></div>
              <button onClick={gen} style={{ width: "100%", marginTop: 14, padding: 12, background: "#34D399", color: "#064E3B", border: "none", borderRadius: 7, fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: "inherit" }}>Generate Bill</button></div></div>
        </div>}</div></div>
  );
}

// ══════════════════════════════════════════════
// SALES PAGE
// ══════════════════════════════════════════════
function SalesPage({ bills, mob }) {
  const [df, setDf] = useState("all"); const now = new Date();
  const fl = bills.filter((b) => { const d = new Date(b.date); if (df === "today") return d.toDateString() === now.toDateString(); if (df === "week") { const w = new Date(now); w.setDate(w.getDate() - 7); return d >= w; } if (df === "month") return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); return true; });
  const tR = fl.reduce((s, b) => s + b.netAmount, 0), tC = fl.reduce((s, b) => s + b.items.reduce((ss, i) => ss + (i.unitPtr || i.ptr || 0) * i.qty, 0), 0), tP = tR - tC;
  return (
    <div><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
      <h2 style={{ ...hds, marginBottom: 0 }}>Sales and Profit</h2>
      <div style={{ display: "flex", gap: 3, background: "#E8E4DD", borderRadius: 7, padding: 3 }}>
        {[["today","Today"],["week","Week"],["month","Month"],["all","All"]].map(([id, l]) => <button key={id} onClick={() => setDf(id)} style={{ padding: "6px 12px", border: "none", borderRadius: 5, fontSize: 11.5, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", background: df === id ? "#fff" : "transparent", color: df === id ? "#0D6B5B" : "#888" }}>{l}</button>)}</div></div>
      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4,1fr)", gap: 12, marginBottom: 16 }}>
        <Stat icon="💰" label="Revenue" value={"Rs." + f2(tR)} color="#2563EB" /><Stat icon="📦" label="Cost" value={"Rs." + f2(tC)} color="#B45309" />
        <Stat icon="📈" label="Profit" value={"Rs." + f2(tP)} color={tP >= 0 ? "#059669" : "#DC2626"} /><Stat icon="📊" label="Margin" value={tR > 0 ? f2(tP / tR * 100) + "%" : "0%"} color="#7C3AED" /></div>
      <div style={cds}><b>Details ({fl.length})</b>{fl.length === 0 ? <p style={{ color: "#aaa", textAlign: "center", padding: 16, fontSize: 12 }}>No sales</p> :
        <div style={{ overflowX: "auto", marginTop: 10 }}><table style={{ width: "100%", borderCollapse: "collapse", minWidth: 500 }}><thead><tr>
          {["Bill","Date","Patient","Revenue","Cost","Profit"].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>
          {[...fl].reverse().map((b) => { const r = b.netAmount, c = b.items.reduce((s, i) => s + (i.unitPtr || i.ptr || 0) * i.qty, 0), p = r - c;
            return (<tr key={b.billNo}><td style={{ ...tds, fontFamily: "monospace", fontWeight: 600, color: "#0D6B5B" }}>{b.billNo}</td><td style={tds}>{fD(b.date)}</td><td style={tds}>{b.patient}</td>
              <td style={{ ...tds, fontWeight: 600 }}>Rs.{f2(r)}</td><td style={{ ...tds, color: "#B45309" }}>Rs.{f2(c)}</td>
              <td style={{ ...tds, fontWeight: 700, color: p >= 0 ? "#059669" : "#DC2626" }}>Rs.{f2(p)}</td></tr>); })}</tbody></table></div>}</div></div>
  );
}

// STOCK PAGE
// ══════════════════════════════════════════════
function StockPage({ inv, isO, mob }) {
  const [v, setV] = useState("all"); const [q, setQ] = useState("");
  const safeExp = (m) => { if (!m || !m.expiry) return 9999; try { return (new Date(m.expiry + "-01") - new Date()) / 864e5; } catch(e) { return 9999; } };
  const low = inv.filter((m) => m.stock > 0 && m.stock < 15), out = inv.filter((m) => m.stock === 0);
  const expS = inv.filter((m) => { const d = safeExp(m); return d < 90 && d > 0; });
  const expD = inv.filter((m) => safeExp(m) <= 0 && m.expiry);
  let list = v === "low" ? low : v === "out" ? out : v === "exp" ? expS : v === "expd" ? expD : inv;
  if (q) list = list.filter((m) => m.name.toLowerCase().includes(q.toLowerCase()));
  return (
    <div><h2 style={hds}>Stock</h2>
      <div style={{ display: "grid", gridTemplateColumns: mob ? "repeat(3,1fr)" : "repeat(5,1fr)", gap: 10, marginBottom: 16 }}>
        {[{ id: "all", l: "All", n: inv.length, i: "📦", c: "#0D6B5B" }, { id: "low", l: "Low", n: low.length, i: "⚠️", c: "#D97706" }, { id: "out", l: "Out", n: out.length, i: "🚫", c: "#DC2626" }, { id: "exp", l: "Expiring", n: expS.length, i: "⏰", c: "#B45309" }, { id: "expd", l: "Expired", n: expD.length, i: "❌", c: "#991B1B" }].map((s) =>
          <button key={s.id} onClick={() => setV(s.id)} style={{ background: v === s.id ? "#FAFAF7" : "#fff", borderRadius: 10, padding: 12, border: v === s.id ? "2px solid " + s.c : "1px solid #eee", cursor: "pointer", textAlign: "left", borderLeft: "4px solid " + s.c, boxShadow: "0 1px 3px rgba(0,0,0,.04)" }}>
            <div style={{ fontSize: 18 }}>{s.i}</div><div style={{ fontSize: 18, fontWeight: 800, fontFamily: "'Playfair Display',serif" }}>{s.n}</div><div style={{ fontSize: 10, color: "#888" }}>{s.l}</div></button>)}</div>
      <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search..." style={{ ...inps, marginBottom: 14 }} />
      <div style={{ ...cds, padding: 0, overflow: "hidden" }}><div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse", minWidth: 500 }}><thead><tr>
        {["Medicine","Batch","Exp","MRP",...(isO ? ["PTR"] : []),"Stock","Status"].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>
        {list.map((m) => { const d = safeExp(m); const isE = d <= 0 && m.expiry; const isES = d > 0 && d < 90;
          const st = m.stock === 0 ? "Out" : m.stock < 15 ? "Low" : isE ? "Expd" : isES ? "Exp" : "OK";
          const sc = { Out: "#DC2626", Low: "#D97706", Expd: "#991B1B", Exp: "#B45309", OK: "#059669" }[st];
          const sb = { Out: "#FEE2E2", Low: "#FEF3C7", Expd: "#FEE2E2", Exp: "#FEF9E7", OK: "#D1FAE5" }[st];
          return (<tr key={m.id}><td style={{ ...tds, fontWeight: 500, whiteSpace: "nowrap" }}>{m.name}</td><td style={{ ...tds, fontFamily: "monospace", fontSize: 11 }}>{m.batch}</td>
            <td style={{ ...tds, color: isE ? "#DC2626" : isES ? "#B45309" : "inherit" }}>{m.expiry || "-"}</td><td style={{ ...tds, fontWeight: 600 }}>Rs.{f2(m.mrp)}</td>
            {isO && <td style={{ ...tds, color: "#B45309" }}>Rs.{f2(m.ptr)}</td>}
            <td style={{ ...tds, fontWeight: 700, color: sc }}>{m.stock}</td><td style={tds}><Tag bg={sb} fg={sc}>{st}</Tag></td></tr>); })}</tbody></table></div>
      {list.length === 0 && <div style={{ padding: 20, textAlign: "center", color: "#aaa", fontSize: 12 }}>No items</div>}</div></div>
  );
}

// BILL HISTORY

      <div style={{ ...cds, padding: 0, overflow: "hidden" }}><div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse", minWidth: 500 }}><thead><tr>

          <td style={{ ...tds, fontWeight: 500 }}>{b.patient}</td><td style={{ ...tds, fontWeight: 700 }}>Rs.{f2(b.netAmount)}</td>

}

// USERS PAGE
// ══════════════════════════════════════════════
function UsersPage({ sessions, mob }) {
  return (
    <div><h2 style={hds}>Users and Sessions</h2>
      <div style={cds}>
        <b>Login Accounts</b>
        <p style={{ fontSize: 12, color: "#888", margin: "8px 0" }}>Manage users in Firebase Console &gt; Authentication &gt; Users</p>
        <div style={{ overflowX: "auto", marginTop: 10 }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>
          {["Email","Role"].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>
          {Object.entries(ROLES).map(([email, role]) => (<tr key={email}><td style={{ ...tds, fontFamily: "monospace" }}>{email}</td>
            <td style={tds}><Tag bg={role === "owner" ? "#FEF3C7" : "#DBEAFE"} fg={role === "owner" ? "#92400E" : "#1E40AF"}>{role.toUpperCase()}</Tag></td></tr>))}</tbody></table></div></div>
      {sessions.length > 0 && <div style={cds}><b>Active Sessions</b><div style={{ overflowX: "auto", marginTop: 10 }}><table style={{ width: "100%", borderCollapse: "collapse" }}><thead><tr>{["User","Device","Last Active"].map((h) => <th key={h} style={ths}>{h}</th>)}</tr></thead><tbody>
        {sessions.map((s, i) => (<tr key={i}><td style={tds}>{s.user}</td><td style={tds}>{s.device}</td><td style={tds}>{s.lastActive}</td></tr>))}</tbody></table></div></div>}</div>
  );
}

// ══════════════════════════════════════════════
// BACKUP PAGE
// ══════════════════════════════════════════════
function BackupPage({ inv, bills, purch, saveAll, askConfirm }) {
  const [backupLink, setBackupLink] = useState(null);
  const fr = useRef(null);
  const doBackup = () => { const data = JSON.stringify({ inv, bills, purch, v: "fb1", date: new Date().toISOString() }); setBackupLink(URL.createObjectURL(new Blob([data], { type: "application/json" }))); };
  const doRestore = (e) => { const file = e.target.files[0]; if (!file) return; const r = new FileReader();
    r.onload = (ev) => { try { const d = JSON.parse(ev.target.result);
      askConfirm("Restore from " + (d.date ? fD(d.date) : "unknown") + "?", () => { saveAll(d.inv || [], d.bills || [], d.purch || []); alert("Restored!"); });
    } catch(err) { alert("Invalid file"); } }; r.readAsText(file); e.target.value = ""; };
  const doReset = () => { askConfirm("DELETE ALL DATA? Backup will be prepared first.", () => { doBackup(); setTimeout(() => { askConfirm("Backup ready. NOW DELETE?", () => { saveAll([], [], []); alert("Reset done."); }); }, 500); }); };

  return (
    <div><h2 style={hds}>Backup, Restore, Reset</h2>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
        <div style={{ ...cds, textAlign: "center", padding: 24 }}><div style={{ fontSize: 36, marginBottom: 8 }}>💾</div><b>Backup</b>
          <p style={{ fontSize: 12, color: "#888", margin: "8px 0" }}>Download all data</p>
          {!backupLink && <button onClick={doBackup} style={{ ...bts(true), width: "100%" }}>Prepare Backup</button>}
          {backupLink && <a href={backupLink} download={"AtoZ_Backup_" + new Date().toISOString().slice(0, 10) + ".json"} style={{ display: "block", padding: "10px", background: "#059669", color: "#fff", borderRadius: 7, textDecoration: "none", fontWeight: 600, fontSize: 13 }}>Download Backup</a>}</div>
        <div style={{ ...cds, textAlign: "center", padding: 24 }}><div style={{ fontSize: 36, marginBottom: 8 }}>📥</div><b>Restore</b>
          <p style={{ fontSize: 12, color: "#888", margin: "8px 0" }}>Upload backup file</p>
          <input ref={fr} type="file" accept=".json" onChange={doRestore} style={{ display: "none" }} />
          <button onClick={() => fr.current && fr.current.click()} style={{ ...bts(true), width: "100%", background: "#2563EB" }}>Upload File</button></div>
        <div style={{ ...cds, textAlign: "center", padding: 24, border: "2px solid #FEE2E2" }}><div style={{ fontSize: 36, marginBottom: 8 }}>🗑</div><b style={{ color: "#DC2626" }}>Reset</b>
          <p style={{ fontSize: 12, color: "#888", margin: "8px 0" }}>Backup then delete all</p>
          <button onClick={doReset} style={{ ...bts(false), width: "100%", background: "#DC2626", color: "#fff" }}>Reset Everything</button></div></div></div>
  );
}

// ══════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dash");
  const [inv, setInv] = useState([]);
  const [bills, setBills] = useState([]);
  const [purch, setPurch] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [sideOpen, setSideOpen] = useState(false);
  const [confirmMsg, setConfirmMsg] = useState(null);
  const confirmCb = useRef(null);
  const [viewBill, setViewBill] = useState(null);
  const [billFromHist, setBillFromHist] = useState(false);
  const mob = useM();
  const isO = user ? user.role === "owner" : false;

  // Check auth state on load
  useEffect(() => {
    const unsub = auth.onAuthStateChanged((fbUser) => {
      if (fbUser) {
        const role = ROLES[fbUser.email] || "staff";
        const name = ROLE_NAMES[fbUser.email] || fbUser.email;
        setUser({ id: fbUser.uid, email: fbUser.email, name, role });
      } else {
        setUser(null);
      }
      setLoading(false);
    });
    return unsub;
  }, []);

  // Real-time listeners - sync data across all devices
  useEffect(() => {
    if (!user) return;
    const unsubs = [
      fbListen("inventory", (data) => { setInv(data ? Object.values(data) : []); }),
      fbListen("bills", (data) => { setBills(data ? Object.values(data) : []); }),
      fbListen("purchases", (data) => { setPurch(data ? Object.values(data) : []); }),
      fbListen("sessions", (data) => { setSessions(data ? Object.values(data) : []); }),
    ];
    // Register this session
    const dev = /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop";
    fbSet("sessions/" + user.id, { user: user.name, device: dev, lastActive: new Date().toLocaleString(), uId: user.id });
    return () => unsubs.forEach((u) => u());
  }, [user]);

  // Data save helpers - write to Firebase, listeners auto-update state
  const saveInv = useCallback((data) => {
    const obj = {}; data.forEach((m) => { obj[m.id] = m; });
    fbSet("inventory", obj);
  }, []);
  const saveBills = useCallback((data) => {
    const obj = {}; data.forEach((b) => { obj[b.billNo] = b; });
    fbSet("bills", obj);
  }, []);
  const savePurch = useCallback((data) => {
    const obj = {}; data.forEach((p) => { obj[p.id] = p; });
    fbSet("purchases", obj);
  }, []);
  const saveAll = useCallback((i, b, p) => {
    const io = {}; i.forEach((m) => { io[m.id] = m; });
    const bo = {}; b.forEach((x) => { bo[x.billNo] = x; });
    const po = {}; p.forEach((x) => { po[x.id] = x; });
    fbSet("inventory", io); fbSet("bills", bo); fbSet("purchases", po);
  }, []);

  const askConfirm = useCallback((msg, cb) => { setConfirmMsg(msg); confirmCb.current = cb; }, []);
  const onConfirmYes = () => { if (confirmCb.current) confirmCb.current(); setConfirmMsg(null); confirmCb.current = null; };
  const onConfirmNo = () => { setConfirmMsg(null); confirmCb.current = null; };
  const showBill = useCallback((b, hist) => { setViewBill(b); setBillFromHist(!!hist); }, []);

  const login = (u) => { setUser(u); };
  const logout = () => { auth.signOut(); fbSet("sessions/" + (user ? user.id : ""), null); setUser(null); setPage("dash"); };

  const addBill = useCallback((bill) => {
    setBills((p) => { const next = [...p, bill]; saveBills(next); return next; });
  }, [saveBills]);

  const addPurchase = useCallback((rev) => {
    const pur = { id: mkId(), invoiceNo: rev.invoiceNo || "", supplier: rev.supplier || "", date: rev.date || "", entryDate: new Date().toISOString(), items: rev.items, sourceType: rev.srcType || "manual", sourceFile: rev.srcFile || "", netAmount: rev.items.reduce((s, i) => s + (i.amount || i.ptr * i.qty), 0) };
    setPurch((p) => { const next = [...p, pur]; savePurch(next); return next; });
    setInv((prevInv) => {
      let next = [...prevInv];
      rev.items.forEach((it) => {
        const ex = next.findIndex((m) => m.name.toLowerCase() === it.name.toLowerCase() && m.batch === it.batch);
        if (ex >= 0) { next = next.map((m, i) => i === ex ? { ...m, stock: m.stock + (it.qty || 0) + (it.freeQty || 0), ptr: it.ptr || m.ptr, mrp: it.mrp || m.mrp } : m); }
        else { next.push({ id: mkId(), name: it.name, manufacturer: it.manufacturer || "", hsn: it.hsn || "300490", batch: it.batch || "", expiry: it.expiry || "", pack: it.pack || "", mrp: it.mrp || 0, ptr: it.ptr || 0, stock: (it.qty || 0) + (it.freeQty || 0), gstRate: it.gstRate || 5, rack: it.rack || "", packQty: it.packQty || 0, distributor: rev.supplier, addedFrom: rev.srcType || "manual", uid: mkUID() }); }
      });
      saveInv(next);
      return next;
    });
  }, [saveInv, savePurch]);

  const deletePurchase = useCallback((id) => {
    setPurch((p) => { const next = p.filter((x) => x.id !== id); savePurch(next); return next; });
  }, [savePurch]);

  if (loading) return (<div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: "#EFECE5", fontFamily: "'Playfair Display',serif", fontSize: 18, color: "#0C2E24" }}>Loading...</div>);
  if (!user) return (<Login onLogin={login} />);

  const counts = { purch: purch.length, hist: bills.length, inv: inv.length, stock: inv.filter((m) => m.stock > 0 && m.stock < 15).length };

  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: "'DM Sans',sans-serif", background: "#EFECE5", overflow: "hidden" }}>
      <ConfirmModal msg={confirmMsg} onYes={onConfirmYes} onNo={onConfirmNo} />
      <BillView bill={viewBill} onClose={() => setViewBill(null)} fromHistory={billFromHist} />
      <Sidebar page={page} setPage={setPage} user={user} onLogout={logout} counts={counts} mob={mob} sideOpen={sideOpen} setSideOpen={setSideOpen} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {mob && <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", background: "#fff", borderBottom: "1px solid #E5E2DB", flexShrink: 0 }}>
          <button onClick={() => setSideOpen(true)} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer" }}>☰</button>
          <div style={{ fontWeight: 700, fontFamily: "'Playfair Display',serif", fontSize: 15, color: "#0C2E24" }}>A to Z Pharmacy</div>
          <div style={{ width: 30, height: 30, borderRadius: 7, background: "#E8E4DD", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>{isO ? "👑" : "👤"}</div></div>}
        <div style={{ flex: 1, padding: mob ? 14 : 24, overflow: "auto" }}>
          {page === "dash" && <DashPage inv={inv} bills={bills} purch={purch} isO={isO} mob={mob} />}
          {page === "purch" && <PurchPage purch={purch} addPurchase={addPurchase} deletePurchase={deletePurchase} mob={mob} askConfirm={askConfirm} />}
          {page === "inv" && <InvPage inv={inv} saveInv={saveInv} isO={isO} mob={mob} askConfirm={askConfirm} />}
          {page === "bill" && <BillPage inv={inv} saveInv={saveInv} addBill={addBill} mob={mob} showBill={showBill} />}
          {page === "sales" && isO && <SalesPage bills={bills} mob={mob} />}
          {page === "stock" && <StockPage inv={inv} isO={isO} mob={mob} />}
          {page === "hist" && <HistPage bills={bills} showBill={showBill} />}
          {page === "users" && isO && <UsersPage sessions={sessions} mob={mob} />}
          {page === "backup" && isO && <BackupPage inv={inv} bills={bills} purch={purch} saveAll={saveAll} askConfirm={askConfirm} />}
        </div></div></div>
  );
}

// SETUP SCREEN (shown when Firebase not configured)
function SetupScreen() {
  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0C2E24,#1A5744,#0C2E24)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: "#fff", borderRadius: 16, padding: 36, width: "100%", maxWidth: 600, boxShadow: "0 20px 60px rgba(0,0,0,.3)" }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ width: 56, height: 56, background: "linear-gradient(135deg,#0D6B5B,#34D399)", borderRadius: 14, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 26, marginBottom: 12 }}>💊</div>
          <div style={{ fontSize: 22, fontWeight: 800, fontFamily: "'Playfair Display',serif", color: "#0C2E24" }}>A to Z Pharmacy</div>
          <div style={{ fontSize: 14, color: "#DC2626", marginTop: 8, fontWeight: 600 }}>Setup Required</div></div>
        <div style={{ fontSize: 13, lineHeight: 1.8, color: "#555" }}>
          <p style={{ marginBottom: 12 }}>This app needs a Firebase database to store your data. Follow these steps:</p>
          <ol style={{ paddingLeft: 20 }}>
            <li>Go to <b>console.firebase.google.com</b> and create a free project</li>
            <li>Enable <b>Realtime Database</b> (Build menu, test mode)</li>
            <li>Enable <b>Authentication</b> with Email/Password</li>
            <li>Add users: <b>owner@atozpharmacy.com</b> and <b>staff@atozpharmacy.com</b></li>
            <li>Get the Firebase config from Project Settings</li>
            <li>Open this <b>index.html</b> in a text editor (Notepad)</li>
            <li>Replace <b>PASTE_YOUR_API_KEY</b> etc. with your Firebase values</li>
            <li>Upload to GitHub Pages for a permanent URL</li>
          </ol>
          <p style={{ marginTop: 12, color: "#888", fontSize: 12 }}>See the SETUP_GUIDE.md file for detailed instructions with every click explained.</p>
        </div>
      </div></div>
  );
}

// RENDER
if (!CONFIGURED) {
  ReactDOM.render(<SetupScreen />, document.getElementById("root"));
} else {
  ReactDOM.render(<App />, document.getElementById("root"));
}
</script>
